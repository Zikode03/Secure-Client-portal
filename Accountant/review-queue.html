<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Queue | Prospera Accountant Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  
<link rel="stylesheet" href="../shared/accountant-theme.css">
<style>
    /* 
       Reuse almost all your dashboard styles
     */
    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f6f6f8;
      color: #111318;
    }

    .app-layout { display:flex; min-height:100vh; width:100%; }

    .sidebar {
      width:260px;
      background:linear-gradient(180deg,#0f172a,#020617);
      color:white;
      display:flex;
      flex-direction:column;
      position:fixed;
      height:100vh;
    }

    .sidebar-header {
      padding:22px;
      display:flex;
      gap:12px;
      align-items:center;
    }

    .sidebar-header i { font-size:30px; color:#60a5fa; }

    .nav { padding:16px; flex:1; }

    .nav a {
      display:flex;
      gap:12px;
      align-items:center;
      padding:12px 14px;
      border-radius:10px;
      color:#cbd5f5;
      text-decoration:none;
      margin-bottom:6px;
    }

    .nav a:hover { background:#1e293b; }
    .nav a.active { background:#2563eb; color:white; }

    .sidebar-footer { padding:16px; }

    .user-box {
      background:#1e293b;
      padding:12px;
      border-radius:10px;
      margin-bottom:12px;
    }

    .logout {
      width:100%;
      background:none;
      border:none;
      color:#cbd5f5;
      padding:12px;
      border-radius:10px;
      cursor:pointer;
      text-align:left;
    }

    .logout:hover { background:#1e293b; }

    .main { margin-left:260px; flex:1; padding:28px; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #1754cf;
      font-weight: 600;
      margin-bottom: 24px;
      text-decoration: none;
      font-size: 15px;
    }

    .back-link:hover { text-decoration: underline; }

    h1 { font-size: 26px; margin-bottom: 8px; }
    .subtitle { color: #6b7280; margin-bottom: 32px; font-size: 15px; }
    .bulk-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 12px;
    }
    .bulk-count {
      font-size: 13px;
      color: #64748b;
      margin-right: 6px;
    }
    .bulk-btn {
      border: 1px solid #dbe3f0;
      border-radius: 8px;
      padding: 7px 10px;
      background: #fff;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
    }
    .bulk-btn.primary { background: #1754cf; color: #fff; border-color: #1754cf; }
    .bulk-btn.warn { color: #92400e; border-color: #f59e0b; background: #fffbeb; }
    .bulk-btn.danger { color: #991b1b; border-color: #ef4444; background: #fef2f2; }
    .bulk-btn.info { color: #1e3a8a; border-color: #3b82f6; background: #eff6ff; }
    .select-doc {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      accent-color: #1754cf;
    }
    .reviewer-select {
      border: 1px solid #dbe3f0;
      border-radius: 8px;
      background: #fff;
      height: 32px;
      padding: 0 8px;
      font-size: 12px;
    }
    .priority-pill, .sla-pill {
      display: inline-flex;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .priority-high { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .priority-medium { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .priority-low { background: #dcfce7; color: #166534; border-color: #86efac; }
    .sla-ok { background: #dcfce7; color: #166534; border-color: #86efac; }
    .sla-warn { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .sla-overdue { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .policy-note {
      margin-bottom: 14px;
      color: #64748b;
      font-size: 12px;
    }
    .assign-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.5);
      display: grid;
      place-items: center;
      z-index: 1200;
    }
    .modal-card {
      background: #fff;
      border: 1px solid #dbe3f0;
      border-radius: 14px;
      width: min(520px, 92vw);
      padding: 16px;
    }
    .modal-title {
      margin: 0 0 8px;
    }
    .modal-subtitle {
      margin: 0 0 10px;
      color: #64748b;
      font-size: 13px;
    }
    .modal-textarea {
      width: 100%;
      min-height: 110px;
      border: 1px solid #dbe3f0;
      border-radius: 10px;
      padding: 10px;
      font-family: inherit;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
    }
    .modal-btn {
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      border: 1px solid #dbe3f0;
      background: #fff;
    }
    .modal-btn.save {
      border-color: #1d4ed8;
      background: #1d4ed8;
      color: #fff;
    }
    .card-check {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 8px 10px 0;
    }

    .full-queue {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 24px;
    }

    .queue-card {
      background:#ffffff;
      border:1px solid #e1e4ea;
      border-radius:14px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .queue-top {
      padding:12px 16px;
      background:#f9fafb;
      display:flex;
      justify-content:space-between;
      font-size:11px;
      font-weight:700;
      color:#1754cf;
    }

    .queue-body { padding:18px; }

    .queue-body h4 { font-size:16px; font-weight:700; margin-bottom:6px; }

    .queue-body p { font-size:13px; color:#6b7280; margin-bottom:16px; }

    .actions { display:flex; gap:8px; }

    .btn-primary {
      flex:1;
      background:#1754cf;
      color:#ffffff;
      border:none;
      border-radius:8px;
      padding:8px 0;
      font-weight:700;
      cursor:pointer;
    }

    .icon-btn {
      width:38px;
      border:1px solid #e1e4ea;
      background:#ffffff;
      border-radius:8px;
      cursor:pointer;
    }

    .icon-btn.red { color:#ef4444; }

    @media (max-width: 1100px) {
      .full-queue { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 768px) {
      .full-queue { grid-template-columns: 1fr; }
      .main { padding: 20px; }
    }
  </style>
  <script defer src="accountant-nav.js"></script>
</head>
<body>

<div class="app-layout">

  <!-- Sidebar (identical to dashboard) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <i class="fa-solid fa-shield-halved"></i>
      <div>
        <h1>Prospera</h1>
        <p>Accountant Portal</p>
      </div>
    </div>

    <nav class="nav">
      <a href="dashboards.html"><i class="fa fa-chart-line"></i> Dashboard</a>
      <a href="clients.html"><i class="fa fa-users"></i> Clients</a>
      <a href="documents.html"><i class="fa fa-file"></i> Documents</a>
      <a href="tasks.html"><i class="fa fa-tasks"></i> Tasks</a>
      <a href="messages.html"><i class="fa fa-message"></i> Messages</a>
      <a href="settings.html"><i class="fa fa-gear"></i> Settings</a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-box">
        <p><strong>Sarah Johnson</strong></p>
        <p>sarah@prospera.com</p>
        <p class="role">Primary Accountant</p>
      </div>
      <button type="button" class="logout"><i class="fa fa-sign-out"></i> Logout</button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main">
    <a href="dashboards.html" class="back-link">
      <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
    </a>

    <h1>Full Review Queue</h1>
    <p class="subtitle" id="queueSubtitle">Loading queue...</p>
    <p class="policy-note" id="queuePolicy">Ordering policy: priority score (risk + due date + category + SLA), then most recent upload.</p>
    <div class="bulk-bar">
      <label><input id="selectAllDocs" type="checkbox"> Select all</label>
      <span class="bulk-count" id="selectedCount">0 selected</span>
      <select id="bulkReviewerSelect" class="reviewer-select" aria-label="Bulk reviewer">
        <option value="">Assign reviewer...</option>
      </select>
      <button type="button" class="bulk-btn info" id="bulkAssignBtn">Assign Selected</button>
      <button type="button" class="bulk-btn primary" id="bulkApproveBtn">Approve Selected</button>
      <button type="button" class="bulk-btn warn" id="bulkRequestFixBtn">Request Fix Selected</button>
      <button type="button" class="bulk-btn danger" id="bulkRejectBtn">Reject Selected</button>
    </div>

    <div class="full-queue" id="fullQueue"></div>
  </div>
</div>

<script src="../shared/portal-config.js"></script>
<script src="../shared/portal-auth.js"></script>
<script>
const API_BASE_URL = window.PortalConfig.API_BASE_URL;
const session = window.PortalAuth.requireRole("accountant", "accountant logins/login.html");
if (!session) { throw new Error("Unauthorized"); }
const { token } = session;
const selectedDocs = new Set();
let reviewers = [];

function authHeaders() { return window.PortalAuth.authHeaders(token); }

function shortTime(iso) {
  if (!iso) return "-";
  return new Date(iso).toLocaleString();
}

function humanSize(bytes) {
  const n = Number(bytes || 0);
  if (!n) return "-";
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
  return `${(n / (1024 * 1024)).toFixed(1)} MB`;
}

function esc(v) {
  return String(v ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function reviewerOptions(selectedId = "") {
  const options = [`<option value="">Assign reviewer...</option>`];
  for (const reviewer of reviewers) {
    options.push(`<option value="${esc(reviewer.id)}" ${reviewer.id === selectedId ? "selected" : ""}>${esc(reviewer.fullName || reviewer.email || reviewer.id)}</option>`);
  }
  return options.join("");
}

function priorityPill(item) {
  const band = String(item.priorityBand || "low").toLowerCase();
  return `<span class="priority-pill priority-${band}">${esc(band.toUpperCase())} (${Number(item.priorityScore || 0)})</span>`;
}

function slaPill(item) {
  if (item.slaBreached) {
    const overdue = Math.max(1, Number(item.slaAgeHours || 0) - Number(item.slaTargetHours || 48));
    return `<span class="sla-pill sla-overdue">Overdue ${overdue}h</span>`;
  }
  const remaining = Number(item.slaRemainingHours || 0);
  if (remaining <= 12) return `<span class="sla-pill sla-warn">${remaining}h left</span>`;
  return `<span class="sla-pill sla-ok">${remaining}h left</span>`;
}

async function loadReviewers() {
  const response = await fetch(`${API_BASE_URL}/reviews/reviewers`, { headers: authHeaders() });
  if (!response.ok) {
    reviewers = [];
    return;
  }
  const payload = await response.json().catch(() => ({}));
  reviewers = Array.isArray(payload.items) ? payload.items : [];
  document.getElementById("bulkReviewerSelect").innerHTML = reviewerOptions();
}

async function runReviewAction(documentId, action, presetNote = null) {
  let note = presetNote == null ? "" : String(presetNote);
  if (action === "reject" || action === "request_fix") {
    if (presetNote == null) {
      note = await requestReviewNote(action);
    }
    if (!note.trim()) {
      throw new Error("Review note is required for reject/request-fix actions.");
    }
  }
  const response = await fetch(`${API_BASE_URL}/reviews/${encodeURIComponent(documentId)}/action`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ action, note })
  });
  const payload = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(payload.error || "Review action failed");
}

async function assignReviewer(documentId, reviewerUserId) {
  if (!reviewerUserId) throw new Error("Select a reviewer first.");
  const response = await fetch(`${API_BASE_URL}/reviews/${encodeURIComponent(documentId)}/assign`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ reviewerUserId }),
  });
  const payload = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(payload.error || "Reviewer assignment failed");
}

async function requestReviewNote(action) {
  return new Promise((resolve) => {
    let overlay = document.getElementById("reviewNoteModal");
    if (!overlay) {
      overlay = document.createElement("div");
      overlay.id = "reviewNoteModal";
      overlay.className = "modal-overlay";
      overlay.innerHTML = `
        <div class="modal-card">
            <h3 class="modal-title">Add Review Note</h3>
            <p class="modal-subtitle">A note is required for this action.</p>
            <textarea id="reviewNoteInput" class="modal-textarea"></textarea>
            <div class="modal-actions">
              <button id="reviewNoteCancel" type="button" class="modal-btn">Cancel</button>
              <button id="reviewNoteSave" type="button" class="modal-btn save">Save Note</button>
            </div>
        </div>
      `;
      document.body.appendChild(overlay);
    } else {
      overlay.style.display = "grid";
    }

    const input = overlay.querySelector("#reviewNoteInput");
    input.value = "";
    input.placeholder = action === "reject" ? "Reason for rejection..." : "What should be fixed?";
    input.focus();

    const close = (value) => {
      overlay.style.display = "none";
      resolve(value || "");
    };
    overlay.querySelector("#reviewNoteCancel").onclick = () => close("");
    overlay.querySelector("#reviewNoteSave").onclick = () => close(input.value.trim());
  });
}

async function loadQueue() {
  const response = await fetch(`${API_BASE_URL}/dashboard/review-queue`, { headers: authHeaders() });
  if (!response.ok) throw new Error("Failed to load review queue");
  const data = await response.json();

  document.getElementById("queueSubtitle").textContent =
    `${data.items.length} items awaiting review`;
  document.getElementById("queuePolicy").textContent =
    `Ordering policy: ${data.orderingPolicy || "priority_score_desc_then_uploadedAt_desc"}`;

  const container = document.getElementById("fullQueue");
  selectedDocs.clear();
  document.getElementById("selectedCount").textContent = "0 selected";
  document.getElementById("selectAllDocs").checked = false;
  container.innerHTML = data.items.length
    ? data.items.map((item) => `
      <div class="queue-card">
        <div class="card-check">
          <label>
            <input class="select-doc" type="checkbox" data-select-doc="${item.id}" aria-label="Select ${item.documentName}">
          </label>
        </div>
        <div class="queue-top"><span>${item.category}</span><span>${shortTime(item.uploadedAt)}</span></div>
        <div class="queue-body">
          <h4>${item.clientName} - ${item.documentName}</h4>
          <p>Status: ${item.status} - ${humanSize(item.sizeBytes)}</p>
          <div class="actions" style="margin-bottom:8px;">
            ${priorityPill(item)}
            ${slaPill(item)}
            ${item.escalated ? '<span class="priority-pill priority-high">Escalated</span>' : ""}
          </div>
          <p class="subtitle" style="margin:0 0 8px;font-size:12px;">
            ${item.reviewerName ? `Reviewer: ${esc(item.reviewerName)}` : "Reviewer: Unassigned"}
            ${item.escalationReason ? ` | ${esc(item.escalationReason)}` : ""}
          </p>
          <div class="assign-row">
            <select class="reviewer-select" data-reviewer-select="${item.id}">
              ${reviewerOptions(item.reviewerUserId || "")}
            </select>
            <button type="button" class="bulk-btn info" data-assign-doc-id="${item.id}">Assign</button>
          </div>
          <div class="actions">
            <button type="button" class="btn-primary" data-action="approve" data-doc-id="${item.id}">Approve</button>
            <button type="button" class="icon-btn" data-view-id="${item.id}"><i class="fa-solid fa-eye"></i></button>
            <button type="button" class="icon-btn" data-action="request_fix" data-doc-id="${item.id}"><i class="fa-solid fa-pen"></i></button>
            <button type="button" class="icon-btn red" data-action="reject" data-doc-id="${item.id}"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>
      </div>
    `).join("")
    : `<div class="queue-card"><div class="queue-body"><p>No pending reviews.</p></div></div>`;
}

function updateSelectedCount() {
  document.getElementById("selectedCount").textContent = `${selectedDocs.size} selected`;
}

async function runBulkReviewAction(action) {
  if (!selectedDocs.size) return;
  const ids = Array.from(selectedDocs);
  let bulkNote = null;
  if (action === "reject" || action === "request_fix") {
    bulkNote = await requestReviewNote(action);
    if (!bulkNote.trim()) return;
  }
  const response = await fetch(`${API_BASE_URL}/reviews/bulk`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ action, documentIds: ids, note: bulkNote || "" }),
  });
  const payload = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(payload.error || "Bulk review action failed");
  if (payload.failed) throw new Error(`${payload.failed} item(s) failed`);
  selectedDocs.clear();
  updateSelectedCount();
  await loadQueue();
}

async function runBulkAssign() {
  const reviewerUserId = String(document.getElementById("bulkReviewerSelect").value || "");
  const ids = Array.from(selectedDocs);
  if (!ids.length || !reviewerUserId) return;
  const response = await fetch(`${API_BASE_URL}/reviews/bulk`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ action: "assign", documentIds: ids, reviewerUserId }),
  });
  const payload = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(payload.error || "Bulk assign failed");
  if (payload.failed) throw new Error(`${payload.failed} item(s) failed`);
  await loadQueue();
}

document.addEventListener("click", async (event) => {
  const assignBtn = event.target.closest("[data-assign-doc-id]");
  if (assignBtn) {
    const documentId = assignBtn.getAttribute("data-assign-doc-id");
    const selector = document.querySelector(`[data-reviewer-select="${documentId}"]`);
    if (!selector) return;
    try {
      await assignReviewer(documentId, selector.value);
      await loadQueue();
    } catch (error) {
      console.error(error);
    }
    return;
  }

  const actionBtn = event.target.closest("[data-action][data-doc-id]");
  if (actionBtn) {
    try {
      await runReviewAction(actionBtn.getAttribute("data-doc-id"), actionBtn.getAttribute("data-action"));
      await loadQueue();
    } catch (error) {
      console.error(error);
    }
    return;
  }

  const viewBtn = event.target.closest("[data-view-id]");
  if (viewBtn) {
    window.location.href = `documentview.html?id=${encodeURIComponent(viewBtn.getAttribute("data-view-id"))}`;
  }
});

document.addEventListener("change", (event) => {
  const select = event.target.closest("[data-select-doc]");
  if (select) {
    const id = select.getAttribute("data-select-doc");
    if (select.checked) selectedDocs.add(id);
    else selectedDocs.delete(id);
    updateSelectedCount();
    return;
  }
});

document.getElementById("selectAllDocs").addEventListener("change", (event) => {
  const checked = event.target.checked;
  document.querySelectorAll("[data-select-doc]").forEach((input) => {
    input.checked = checked;
    const id = input.getAttribute("data-select-doc");
    if (checked) selectedDocs.add(id);
    else selectedDocs.delete(id);
  });
  updateSelectedCount();
});

document.getElementById("bulkApproveBtn").addEventListener("click", () => {
  runBulkReviewAction("approve").catch((error) => console.error(error));
});
document.getElementById("bulkRequestFixBtn").addEventListener("click", () => {
  runBulkReviewAction("request_fix").catch((error) => console.error(error));
});
document.getElementById("bulkRejectBtn").addEventListener("click", () => {
  runBulkReviewAction("reject").catch((error) => console.error(error));
});
document.getElementById("bulkAssignBtn").addEventListener("click", () => {
  runBulkAssign().catch((error) => console.error(error));
});

loadReviewers()
  .then(loadQueue)
  .catch((error) => console.error(error));
</script>

</body>
</html>
