<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clients | Prospera Accountant Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared/accountant-theme.css">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #f6f8fc; color: #0f172a; font-family: "Public Sans", Arial, sans-serif; }
.app-layout { display: flex; min-height: 100vh; }
.page { margin-left: 260px; flex: 1; width: auto; padding: 26px 28px; }
.page-header { display: flex; justify-content: space-between; align-items: end; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
.page-header h1 { margin: 0; font-size: 30px; letter-spacing: -0.02em; }
.page-header p { margin: 6px 0 0; color: #64748b; }
.toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.input, .select { height: 40px; border: 1px solid #dbe3f0; border-radius: 10px; background: #fff; padding: 0 12px; }
.input { min-width: 260px; }
.btn { border: 1px solid #dbe3f0; border-radius: 10px; background: #fff; color: #0f172a; padding: 10px 14px; cursor: pointer; font-weight: 600; }
.btn.primary { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
.grid { display: grid; grid-template-columns: repeat(4,minmax(170px,1fr)); gap: 12px; margin-bottom: 14px; }
.kpi { background: #fff; border: 1px solid #dbe3f0; border-radius: 14px; padding: 14px; box-shadow: 0 6px 16px rgba(15,23,42,.05); }
.kpi .label { color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.kpi .value { font-size: 24px; font-weight: 700; margin-top: 6px; }
.card { background: #fff; border: 1px solid #dbe3f0; border-radius: 14px; box-shadow: 0 6px 16px rgba(15,23,42,.05); overflow: hidden; }
.table-wrap { overflow: auto; max-height: calc(100vh - 340px); }
table { width: 100%; border-collapse: collapse; min-width: 860px; }
thead th { position: sticky; top: 0; z-index: 2; background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #dbe3f0; padding: 12px 14px; text-align: left; }
tbody td { border-bottom: 1px solid #eef2f7; padding: 12px 14px; font-size: 14px; }
.pill { border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 700; }
.pill.active { background: #dcfce7; color: #166534; }
.pill.pending { background: #fef3c7; color: #92400e; }
.pill.risk { background: #fee2e2; color: #b91c1c; }
.row-actions { display: flex; gap: 6px; }
.icon-btn { width: 34px; height: 34px; border: 1px solid #dbe3f0; border-radius: 8px; background: #fff; cursor: pointer; }
.empty { padding: 40px; text-align: center; color: #64748b; }
.modal-backdrop { position: fixed; inset: 0; background: rgba(2,6,23,.45); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal { width: min(560px,92vw); background: #fff; border-radius: 14px; border: 1px solid #dbe3f0; box-shadow: 0 20px 50px rgba(2,6,23,.25); }
.modal header { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.modal .body { padding: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid .full { grid-column: 1 / -1; }
.label { font-size: 12px; font-weight: 700; color: #334155; margin-bottom: 4px; display: block; }
.message { min-height: 20px; margin-top: 8px; font-size: 13px; }
.message.error { color: #b91c1c; }
.message.ok { color: #166534; }
@media (max-width: 900px) {
  .page { margin-left: 0; width: 100%; }
  .grid { grid-template-columns: repeat(2,minmax(150px,1fr)); }
}
</style>
<script defer src="accountant-nav.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="nav"></div>
  </aside>
  <main class="page">
    <section class="page-header">
      <div>
        <h1>Clients</h1>
        <p>Manage client records and quickly act on at-risk accounts.</p>
      </div>
      <button class="btn primary" id="openCreateClient" type="button"><i class="fa-solid fa-plus"></i> Add Client</button>
    </section>

    <section class="toolbar">
      <input class="input" id="searchInput" placeholder="Search name, contact, entity type" aria-label="Search clients">
      <select class="select" id="statusFilter" aria-label="Filter client status">
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="pending">Pending</option>
        <option value="at-risk">At Risk</option>
      </select>
      <button class="btn" id="refreshBtn" type="button"><i class="fa-solid fa-rotate"></i> Refresh</button>
    </section>

    <section class="grid" id="kpiGrid"></section>

    <section class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Client</th>
              <th>Entity Type</th>
              <th>Primary Contact</th>
              <th>Email</th>
              <th>Status</th>
              <th>Health</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="clientsTableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty" hidden>No clients found for current filters.</div>
    </section>
  </main>
</div>

<div id="createClientModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="createClientTitle">
  <div class="modal">
    <header>
      <strong id="createClientTitle">Create New Client</strong>
      <button id="closeCreateClient" class="icon-btn" type="button" aria-label="Close create client dialog"><i class="fa-solid fa-xmark"></i></button>
    </header>
    <div class="body">
      <div class="form-grid">
        <div class="full">
          <label class="label" for="newClientName">Client Name</label>
          <input id="newClientName" class="input" placeholder="Example: Apex Holdings">
        </div>
        <div>
          <label class="label" for="newEntityType">Entity Type</label>
          <input id="newEntityType" class="input" placeholder="Pty Ltd">
        </div>
        <div>
          <label class="label" for="newPrimaryContact">Primary Contact</label>
          <input id="newPrimaryContact" class="input" placeholder="Jane Doe">
        </div>
        <div class="full">
          <label class="label" for="newClientEmail">Email</label>
          <input id="newClientEmail" class="input" placeholder="contact@company.com">
        </div>
      </div>
      <p id="createClientMessage" class="message"></p>
      <div class="toolbar" style="margin-top:10px; margin-bottom:0;">
        <button class="btn" id="cancelCreateClient" type="button">Cancel</button>
        <button class="btn primary" id="saveCreateClient" type="button">Create Client</button>
      </div>
    </div>
  </div>
</div>

<script src="../shared/portal-config.js"></script>
<script src="../shared/portal-auth.js"></script>
<script>
const API_BASE_URL = window.PortalConfig?.API_BASE_URL || "http://127.0.0.1:4010/api";
const session = window.PortalAuth.requireRole("accountant", "accountant logins/login.html");
if (!session) throw new Error("Unauthorized");

const state = { clients: [] };
const tableBody = document.getElementById("clientsTableBody");
const emptyState = document.getElementById("emptyState");
const kpiGrid = document.getElementById("kpiGrid");
const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");

function authHeaders() { return window.PortalAuth.authHeaders(session.token); }
function esc(v) { return String(v || "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[m])); }
function healthPill(v) { return Number(v || 0) >= 80 ? "active" : Number(v || 0) >= 50 ? "pending" : "risk"; }
function statusPill(v) { const s = String(v || "").toLowerCase(); return s === "active" ? "active" : s === "pending" ? "pending" : "risk"; }

function renderKpi(items) {
  const total = items.length;
  const active = items.filter((c) => String(c.status).toLowerCase() === "active").length;
  const pending = items.filter((c) => String(c.status).toLowerCase() === "pending").length;
  const atRisk = items.filter((c) => String(c.status).toLowerCase() === "at-risk").length;
  kpiGrid.innerHTML = `
    <article class="kpi"><div class="label">Total Clients</div><div class="value">${total}</div></article>
    <article class="kpi"><div class="label">Active</div><div class="value">${active}</div></article>
    <article class="kpi"><div class="label">Pending</div><div class="value">${pending}</div></article>
    <article class="kpi"><div class="label">At Risk</div><div class="value">${atRisk}</div></article>
  `;
}

function filteredClients() {
  const q = searchInput.value.trim().toLowerCase();
  const status = statusFilter.value.toLowerCase();
  return state.clients.filter((client) => {
    const statusOk = !status || String(client.status || "").toLowerCase() === status;
    if (!statusOk) return false;
    if (!q) return true;
    return [client.name, client.entityType, client.primaryContact, client.email].some((v) => String(v || "").toLowerCase().includes(q));
  });
}

function renderTable() {
  const items = filteredClients();
  renderKpi(items);
  tableBody.innerHTML = "";
  emptyState.hidden = items.length > 0;
  if (!items.length) return;

  tableBody.innerHTML = items.map((client) => `
    <tr>
      <td><strong>${esc(client.name)}</strong><br><span style="color:#64748b;font-size:12px;">${esc(client.id)}</span></td>
      <td>${esc(client.entityType)}</td>
      <td>${esc(client.primaryContact)}</td>
      <td>${esc(client.email)}</td>
      <td><span class="pill ${statusPill(client.status)}">${esc(client.status)}</span></td>
      <td><span class="pill ${healthPill(client.complianceHealth)}">${Number(client.complianceHealth || 0)}%</span></td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" type="button" data-open-client="${esc(client.id)}" title="Open client profile"><i class="fa-solid fa-user"></i></button>
          <button class="icon-btn" type="button" data-open-docs="${esc(client.id)}" title="Open documents"><i class="fa-solid fa-file-lines"></i></button>
          <button class="icon-btn" type="button" data-open-msg="${esc(client.id)}" title="Open messages"><i class="fa-solid fa-message"></i></button>
        </div>
      </td>
    </tr>
  `).join("");
}

async function loadClients() {
  const response = await fetch(`${API_BASE_URL}/clients`, { headers: authHeaders() });
  if (!response.ok) throw new Error("Failed to load clients");
  const payload = await response.json().catch(() => ({}));
  state.clients = Array.isArray(payload.items) ? payload.items : [];
  renderTable();
}

function openCreateClientModal(open) {
  document.getElementById("createClientModal").style.display = open ? "flex" : "none";
  if (!open) document.getElementById("createClientMessage").textContent = "";
}

async function createClient() {
  const name = document.getElementById("newClientName").value.trim();
  const entityType = document.getElementById("newEntityType").value.trim();
  const primaryContact = document.getElementById("newPrimaryContact").value.trim();
  const email = document.getElementById("newClientEmail").value.trim();
  const msg = document.getElementById("createClientMessage");
  if (!name || !entityType || !primaryContact || !email) {
    msg.className = "message error";
    msg.textContent = "All fields are required.";
    return;
  }

  const response = await fetch(`${API_BASE_URL}/clients`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ name, entityType, primaryContact, email }),
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.error || "Failed to create client");
  openCreateClientModal(false);
  await loadClients();
}

searchInput.addEventListener("input", renderTable);
statusFilter.addEventListener("change", renderTable);
document.getElementById("refreshBtn").addEventListener("click", () => loadClients().catch(console.error));
document.getElementById("openCreateClient").addEventListener("click", () => openCreateClientModal(true));
document.getElementById("closeCreateClient").addEventListener("click", () => openCreateClientModal(false));
document.getElementById("cancelCreateClient").addEventListener("click", () => openCreateClientModal(false));
document.getElementById("saveCreateClient").addEventListener("click", () => createClient().catch((error) => {
  const msg = document.getElementById("createClientMessage");
  msg.className = "message error";
  msg.textContent = error.message || "Failed to create client";
}));

document.addEventListener("click", (event) => {
  const openClient = event.target.closest("[data-open-client]");
  if (openClient) {
    window.location.href = `client-profile.html?id=${encodeURIComponent(openClient.getAttribute("data-open-client"))}`;
    return;
  }
  const openDocs = event.target.closest("[data-open-docs]");
  if (openDocs) {
    window.location.href = `documents.html?clientId=${encodeURIComponent(openDocs.getAttribute("data-open-docs"))}`;
    return;
  }
  const openMsg = event.target.closest("[data-open-msg]");
  if (openMsg) {
    window.location.href = `messages.html?clientId=${encodeURIComponent(openMsg.getAttribute("data-open-msg"))}`;
  }
});

loadClients().catch((error) => {
  tableBody.innerHTML = "";
  emptyState.hidden = false;
  emptyState.textContent = error.message || "Failed to load clients.";
  renderKpi([]);
});
</script>
</body>
</html>
