<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clients | Prospera Accountant Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../shared/accountant-theme.css">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #f6f8fc; color: #0f172a; font-family: "Public Sans", Arial, sans-serif; }
.app-layout { display: flex; min-height: 100vh; }
.page { margin-left: 260px; flex: 1; width: auto; padding: 28px 30px; background: radial-gradient(900px 320px at 100% -2%, rgba(37,99,235,.08), transparent 70%), #f6f8fc; }
.page-header { display: flex; justify-content: space-between; align-items: end; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.page-header h1 { margin: 0; font-size: 30px; letter-spacing: -0.02em; }
.page-header p { margin: 6px 0 0; color: #64748b; line-height: 1.45; }

.filters-card {
  background: #fff;
  border: 1px solid #dbe3f0;
  border-radius: 14px;
  box-shadow: 0 6px 16px rgba(15,23,42,.05);
  padding: 12px;
  margin-bottom: 12px;
}
.filters-top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: center; }
.filters-main { display: grid; grid-template-columns: minmax(280px, 1.8fr) minmax(150px, .8fr) minmax(150px, .8fr); gap: 8px; flex: 1; }
.filters-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.filters-advanced {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #e2e8f0;
  display: grid;
  grid-template-columns: repeat(5, minmax(130px, 1fr));
  gap: 8px;
}
.filters-advanced.hidden { display: none; }

.search-wrap { position: relative; min-width: 0; }
.search-wrap i {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: #64748b;
  font-size: 12px;
}

.input, .select {
  height: 42px;
  border: 1px solid #dbe3f0;
  border-radius: 10px;
  background: #fff;
  padding: 0 12px;
  width: 100%;
  transition: border-color .15s ease, box-shadow .15s ease, background-color .15s ease;
}
.search-wrap .input { padding-left: 32px; min-width: 0; }
.input:focus, .select:focus {
  outline: none;
  border-color: #93c5fd;
  box-shadow: 0 0 0 3px rgba(147,197,253,.35);
}

.btn { border: 1px solid #dbe3f0; border-radius: 10px; background: #fff; color: #0f172a; padding: 10px 14px; cursor: pointer; font-weight: 600; }
.btn.primary { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
.btn:hover { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
.btn.primary:hover { background: #1e40af; border-color: #1e40af; color: #fff; }

.bulk-row {
  display: grid;
  grid-template-columns: auto minmax(160px, 170px) minmax(240px, 1fr) auto;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
  padding: 12px;
  border: 1px solid #dbe3f0;
  border-radius: 14px;
  background: #fff;
  box-shadow: 0 6px 16px rgba(15,23,42,.05);
}
.bulk-row .count { font-size: 12px; color: #64748b; font-weight: 700; margin-right: 4px; }
.pager { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid #e2e8f0; background: #fff; }
.pager .meta { color: #64748b; font-size: 12px; }
.chk { width: 16px; height: 16px; accent-color: #1d4ed8; }
.grid { display: grid; grid-template-columns: repeat(4,minmax(170px,1fr)); gap: 12px; margin-bottom: 14px; }
.kpi {
  background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
  border: 1px solid #dbe3f0;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 6px 16px rgba(15,23,42,.05);
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 3px;
  background: linear-gradient(90deg, #1d4ed8, #60a5fa);
}
.kpi .label { color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.kpi .value { font-size: 24px; font-weight: 700; margin-top: 6px; }
.card { background: #fff; border: 1px solid #dbe3f0; border-radius: 14px; box-shadow: 0 6px 16px rgba(15,23,42,.05); overflow: hidden; }
.card-head {
  padding: 14px 16px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
}
.card-head h2 { margin: 0; font-size: 16px; }
.card-head p { margin: 3px 0 0; color: #64748b; font-size: 13px; }
.table-wrap { overflow: auto; max-height: calc(100vh - 340px); }
table { width: 100%; border-collapse: collapse; min-width: 860px; }
thead th { position: sticky; top: 0; z-index: 2; background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid #dbe3f0; padding: 12px 14px; text-align: left; }
tbody td { border-bottom: 1px solid #eef2f7; padding: 12px 14px; font-size: 14px; }
tbody tr:hover { background: #f8fbff; }
.client-id { color:#64748b; font-size:12px; }
.pill { border-radius: 999px; padding: 4px 10px; font-size: 11px; font-weight: 700; }
.pill.active { background: #dcfce7; color: #166534; }
.pill.pending { background: #fef3c7; color: #92400e; }
.pill.risk { background: #fee2e2; color: #b91c1c; }
.row-actions { display: flex; gap: 6px; }
.icon-btn { width: 34px; height: 34px; border: 1px solid #dbe3f0; border-radius: 8px; background: #fff; cursor: pointer; }
.icon-btn:hover { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
.empty { padding: 40px; text-align: center; color: #64748b; }
.modal-backdrop { position: fixed; inset: 0; background: rgba(2,6,23,.45); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal { width: min(560px,92vw); background: #fff; border-radius: 14px; border: 1px solid #dbe3f0; box-shadow: 0 20px 50px rgba(2,6,23,.25); }
.modal header { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
.modal .body { padding: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid .full { grid-column: 1 / -1; }
.label { font-size: 12px; font-weight: 700; color: #334155; margin-bottom: 4px; display: block; }
.message { min-height: 20px; margin-top: 8px; font-size: 13px; }
.message.error { color: #b91c1c; }
.message.ok { color: #166534; }
.modal-actions { display: flex; gap: 10px; margin-top: 10px; }
@media (max-width: 900px) {
  .page { margin-left: 0; width: 100%; }
  .grid { grid-template-columns: repeat(2,minmax(150px,1fr)); }
  .filters-main { grid-template-columns: 1fr; }
  .filters-advanced { grid-template-columns: 1fr 1fr; }
  .bulk-row { grid-template-columns: 1fr; }
  .modal-actions { flex-wrap: wrap; }
}
</style>
<script defer src="accountant-nav.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="nav"></div>
  </aside>
  <main class="page">
    <section class="page-header">
      <div>
        <h1>Clients</h1>
        <p>Manage client records and quickly act on at-risk accounts.</p>
      </div>
      <button class="btn primary" id="openCreateClient" type="button"><i class="fa-solid fa-plus"></i> Add Client</button>
    </section>

    <section class="filters-card">
      <div class="filters-top">
        <div class="filters-main">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input class="input" id="searchInput" placeholder="Search name, contact, entity type" aria-label="Search clients">
          </div>
          <select class="select" id="statusFilter" aria-label="Filter client status">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="at-risk">At Risk</option>
          </select>
          <select class="select" id="savedViewFilter" aria-label="Saved views">
            <option value="">Saved Views</option>
            <option value="at-risk">At Risk</option>
            <option value="no-activity-30d">No Activity 30d</option>
          </select>
        </div>
        <div class="filters-actions">
          <button class="btn" id="toggleAdvancedFilters" type="button"><i class="fa-solid fa-sliders"></i> More Filters</button>
          <button class="btn" id="clearFiltersBtn" type="button"><i class="fa-solid fa-eraser"></i> Clear</button>
          <button class="btn primary" id="refreshBtn" type="button"><i class="fa-solid fa-rotate"></i> Refresh</button>
        </div>
      </div>
      <div class="filters-advanced hidden" id="advancedFilters">
        <select class="select" id="industryFilter" aria-label="Filter industry">
          <option value="">All Industries</option>
          <option value="Technology">Technology</option>
          <option value="General">General</option>
          <option value="Finance">Finance</option>
        </select>
        <select class="select" id="riskBandFilter" aria-label="Filter risk band">
          <option value="">Any Risk Band</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select class="select" id="complianceStatusFilter" aria-label="Filter compliance status">
          <option value="">Any Compliance</option>
          <option value="non-compliant">Non-compliant</option>
          <option value="at-risk">At-risk</option>
          <option value="compliant">Compliant</option>
        </select>
        <select class="select" id="sortByFilter" aria-label="Sort by">
          <option value="lastActivity">Sort: Last Activity</option>
          <option value="name">Sort: Name</option>
          <option value="risk">Sort: Risk</option>
          <option value="status">Sort: Status</option>
        </select>
        <select class="select" id="sortDirFilter" aria-label="Sort direction">
          <option value="desc">Desc</option>
          <option value="asc">Asc</option>
        </select>
      </div>
    </section>

    <section class="bulk-row">
      <span class="count" id="selectedClientsCount">0 selected</span>
      <select class="select" id="bulkActionSelect" aria-label="Bulk action">
        <option value="">Bulk Action</option>
        <option value="status">Update Status</option>
        <option value="assign_owner">Assign Owner</option>
        <option value="archive">Archive</option>
      </select>
      <input class="input" id="bulkActionValue" placeholder="Value (status or owner user id)" aria-label="Bulk value">
      <button class="btn primary" id="bulkApplyBtn" type="button">Apply to Selected</button>
    </section>

    <section class="grid" id="kpiGrid"></section>

    <section class="card">
      <div class="card-head">
        <div>
          <h2>Client Directory</h2>
          <p id="clientsSubhead">Showing assigned clients</p>
        </div>
        <span class="count" id="tableUpdatedAt">Updated -</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input id="selectAllClients" class="chk" type="checkbox" aria-label="Select all clients"></th>
              <th>Client</th>
              <th>Entity Type</th>
              <th>Primary Contact</th>
              <th>Email</th>
              <th>Status</th>
              <th>Risk</th>
              <th>Owner</th>
              <th>Health</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="clientsTableBody"></tbody>
        </table>
      </div>
      <div class="pager">
        <div class="meta" id="clientsMeta">Page 1</div>
        <div style="display:flex;gap:8px;">
          <button class="btn" id="prevPageBtn" type="button">Previous</button>
          <button class="btn" id="nextPageBtn" type="button">Next</button>
        </div>
      </div>
      <div id="emptyState" class="empty" hidden>No clients found for current filters.</div>
    </section>
  </main>
</div>

<div id="createClientModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="createClientTitle">
  <div class="modal">
    <header>
      <strong id="createClientTitle">Create New Client</strong>
      <button id="closeCreateClient" class="icon-btn" type="button" aria-label="Close create client dialog"><i class="fa-solid fa-xmark"></i></button>
    </header>
    <div class="body">
      <div class="form-grid">
        <div class="full">
          <label class="label" for="newClientName">Client Name</label>
          <input id="newClientName" class="input" placeholder="Example: Apex Holdings">
        </div>
        <div>
          <label class="label" for="newEntityType">Entity Type</label>
          <input id="newEntityType" class="input" placeholder="Pty Ltd">
        </div>
        <div>
          <label class="label" for="newPrimaryContact">Primary Contact</label>
          <input id="newPrimaryContact" class="input" placeholder="Jane Doe">
        </div>
        <div class="full">
          <label class="label" for="newClientEmail">Email</label>
          <input id="newClientEmail" class="input" placeholder="contact@company.com">
        </div>
      </div>
      <p id="createClientMessage" class="message"></p>
      <div class="modal-actions">
        <button class="btn" id="cancelCreateClient" type="button">Cancel</button>
        <button class="btn primary" id="saveCreateClient" type="button">Create Client</button>
      </div>
    </div>
  </div>
</div>

<script src="../shared/portal-config.js"></script>
<script src="../shared/portal-auth.js"></script>
<script>
const API_BASE_URL = window.PortalConfig?.API_BASE_URL || "http://127.0.0.1:4010/api";
const session = window.PortalAuth.requireRole("accountant", "accountant logins/login.html");
if (!session) throw new Error("Unauthorized");

const state = { clients: [], selected: new Set(), page: 1, pageSize: 20, sortBy: "lastActivity", sortDir: "desc", meta: null };
const tableBody = document.getElementById("clientsTableBody");
const emptyState = document.getElementById("emptyState");
const kpiGrid = document.getElementById("kpiGrid");
const searchInput = document.getElementById("searchInput");
const statusFilter = document.getElementById("statusFilter");

function authHeaders() { return window.PortalAuth.authHeaders(session.token); }
function esc(v) { return String(v || "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[m])); }
function healthPill(v) { return Number(v || 0) >= 80 ? "active" : Number(v || 0) >= 50 ? "pending" : "risk"; }
function statusPill(v) { const s = String(v || "").toLowerCase(); return s === "active" ? "active" : s === "pending" ? "pending" : "risk"; }
function riskPill(v) { return String(v || "").toLowerCase() === "low" ? "active" : String(v || "").toLowerCase() === "medium" ? "pending" : "risk"; }

function renderKpi(items) {
  const total = items.length;
  const active = items.filter((c) => String(c.status).toLowerCase() === "active").length;
  const pending = items.filter((c) => String(c.status).toLowerCase() === "pending").length;
  const atRisk = items.filter((c) => String(c.status).toLowerCase() === "at-risk").length;
  kpiGrid.innerHTML = `
    <article class="kpi"><div class="label">Total Clients</div><div class="value">${total}</div></article>
    <article class="kpi"><div class="label">Active</div><div class="value">${active}</div></article>
    <article class="kpi"><div class="label">Pending</div><div class="value">${pending}</div></article>
    <article class="kpi"><div class="label">At Risk</div><div class="value">${atRisk}</div></article>
  `;
}

function renderTable() {
  const items = state.clients;
  renderKpi(items);
  tableBody.innerHTML = "";
  emptyState.hidden = items.length > 0;
  if (!items.length) return;

  tableBody.innerHTML = items.map((client) => `
    <tr>
      <td><input class="chk" type="checkbox" data-select-client="${esc(client.id)}" ${state.selected.has(client.id) ? "checked" : ""}></td>
      <td><strong>${esc(client.name)}</strong><br><span class="client-id">${esc(client.id)}</span></td>
      <td>${esc(client.entityType)}</td>
      <td>${esc(client.primaryContact)}</td>
      <td>${esc(client.email)}</td>
      <td><span class="pill ${statusPill(client.status)}">${esc(client.status)}</span></td>
      <td><span class="pill ${riskPill(client.riskBand)}">${esc(client.riskBand || "-")}</span></td>
      <td>${esc(client.assignedAccountantId || "-")}</td>
      <td><span class="pill ${healthPill(client.complianceHealth)}">${Number(client.complianceHealth || 0)}%</span></td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" type="button" data-open-client="${esc(client.id)}" title="Open client profile"><i class="fa-solid fa-user"></i></button>
          <button class="icon-btn" type="button" data-open-docs="${esc(client.id)}" title="Open documents"><i class="fa-solid fa-file-lines"></i></button>
          <button class="icon-btn" type="button" data-open-msg="${esc(client.id)}" title="Open messages"><i class="fa-solid fa-message"></i></button>
        </div>
      </td>
    </tr>
  `).join("");
  document.getElementById("clientsMeta").textContent = state.meta
    ? `Page ${state.meta.page}/${state.meta.totalPages} | ${state.meta.total} total`
    : "Page 1";
  document.getElementById("clientsSubhead").textContent = state.meta
    ? `Showing ${items.length} clients on this page (${state.meta.total} total)`
    : `Showing ${items.length} clients`;
  document.getElementById("tableUpdatedAt").textContent = `Updated ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
  document.getElementById("selectAllClients").checked = items.length > 0 && items.every((c) => state.selected.has(c.id));
  document.getElementById("selectedClientsCount").textContent = `${state.selected.size} selected`;
}

async function loadClients() {
  const params = new URLSearchParams();
  params.set("page", String(state.page));
  params.set("pageSize", String(state.pageSize));
  params.set("sortBy", state.sortBy);
  params.set("sortDir", state.sortDir);
  const q = searchInput.value.trim();
  if (q) params.set("search", q);
  const s = statusFilter.value.trim();
  if (s) params.set("status", s);
  const industry = document.getElementById("industryFilter")?.value?.trim();
  const riskBand = document.getElementById("riskBandFilter")?.value?.trim();
  const complianceStatus = document.getElementById("complianceStatusFilter")?.value?.trim();
  const savedView = document.getElementById("savedViewFilter")?.value?.trim();
  if (industry) params.set("industry", industry);
  if (riskBand) params.set("riskBand", riskBand);
  if (complianceStatus) params.set("complianceStatus", complianceStatus);
  if (savedView) params.set("view", savedView);

  const response = await fetch(`${API_BASE_URL}/clients?${params.toString()}`, { headers: authHeaders() });
  if (!response.ok) throw new Error("Failed to load clients");
  const payload = await response.json().catch(() => ({}));
  state.clients = Array.isArray(payload.items) ? payload.items : [];
  state.meta = payload.meta || null;
  state.selected = new Set(Array.from(state.selected).filter((id) => state.clients.some((client) => client.id === id)));
  renderTable();
}

function openCreateClientModal(open) {
  document.getElementById("createClientModal").style.display = open ? "flex" : "none";
  if (!open) document.getElementById("createClientMessage").textContent = "";
}

async function createClient() {
  const name = document.getElementById("newClientName").value.trim();
  const entityType = document.getElementById("newEntityType").value.trim();
  const primaryContact = document.getElementById("newPrimaryContact").value.trim();
  const email = document.getElementById("newClientEmail").value.trim();
  const msg = document.getElementById("createClientMessage");
  if (!name || !entityType || !primaryContact || !email) {
    msg.className = "message error";
    msg.textContent = "All fields are required.";
    return;
  }

  const response = await fetch(`${API_BASE_URL}/clients`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ name, entityType, primaryContact, email }),
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.error || "Failed to create client");
  openCreateClientModal(false);
  await loadClients();
}

function onFiltersChanged() {
  state.page = 1;
  state.sortBy = document.getElementById("sortByFilter").value;
  state.sortDir = document.getElementById("sortDirFilter").value;
  loadClients().catch(console.error);
}

function clearFilters() {
  searchInput.value = "";
  statusFilter.value = "";
  document.getElementById("industryFilter").value = "";
  document.getElementById("riskBandFilter").value = "";
  document.getElementById("complianceStatusFilter").value = "";
  document.getElementById("savedViewFilter").value = "";
  document.getElementById("sortByFilter").value = "lastActivity";
  document.getElementById("sortDirFilter").value = "desc";
  onFiltersChanged();
}

searchInput.addEventListener("input", onFiltersChanged);
statusFilter.addEventListener("change", onFiltersChanged);
document.getElementById("industryFilter").addEventListener("change", onFiltersChanged);
document.getElementById("riskBandFilter").addEventListener("change", onFiltersChanged);
document.getElementById("complianceStatusFilter").addEventListener("change", onFiltersChanged);
document.getElementById("savedViewFilter").addEventListener("change", onFiltersChanged);
document.getElementById("sortByFilter").addEventListener("change", onFiltersChanged);
document.getElementById("sortDirFilter").addEventListener("change", onFiltersChanged);
document.getElementById("refreshBtn").addEventListener("click", () => loadClients().catch(console.error));
document.getElementById("clearFiltersBtn").addEventListener("click", clearFilters);
document.getElementById("toggleAdvancedFilters").addEventListener("click", () => {
  const panel = document.getElementById("advancedFilters");
  const isHidden = panel.classList.toggle("hidden");
  document.getElementById("toggleAdvancedFilters").innerHTML = isHidden
    ? '<i class="fa-solid fa-sliders"></i> More Filters'
    : '<i class="fa-solid fa-sliders"></i> Less Filters';
});
document.getElementById("openCreateClient").addEventListener("click", () => openCreateClientModal(true));
document.getElementById("closeCreateClient").addEventListener("click", () => openCreateClientModal(false));
document.getElementById("cancelCreateClient").addEventListener("click", () => openCreateClientModal(false));
document.getElementById("saveCreateClient").addEventListener("click", () => createClient().catch((error) => {
  const msg = document.getElementById("createClientMessage");
  msg.className = "message error";
  msg.textContent = error.message || "Failed to create client";
}));

document.addEventListener("click", (event) => {
  const openClient = event.target.closest("[data-open-client]");
  if (openClient) {
    window.location.href = `client-profile.html?id=${encodeURIComponent(openClient.getAttribute("data-open-client"))}`;
    return;
  }
  const openDocs = event.target.closest("[data-open-docs]");
  if (openDocs) {
    window.location.href = `documents.html?clientId=${encodeURIComponent(openDocs.getAttribute("data-open-docs"))}`;
    return;
  }
  const openMsg = event.target.closest("[data-open-msg]");
  if (openMsg) {
    window.location.href = `messages.html?clientId=${encodeURIComponent(openMsg.getAttribute("data-open-msg"))}`;
  }
});

document.addEventListener("change", (event) => {
  const rowCheck = event.target.closest("[data-select-client]");
  if (rowCheck) {
    const id = rowCheck.getAttribute("data-select-client");
    if (rowCheck.checked) state.selected.add(id);
    else state.selected.delete(id);
    renderTable();
    return;
  }
});

document.getElementById("selectAllClients").addEventListener("change", (event) => {
  const checked = event.target.checked;
  if (checked) state.clients.forEach((client) => state.selected.add(client.id));
  else state.clients.forEach((client) => state.selected.delete(client.id));
  renderTable();
});

document.getElementById("prevPageBtn").addEventListener("click", () => {
  if (state.page <= 1) return;
  state.page -= 1;
  loadClients().catch(console.error);
});
document.getElementById("nextPageBtn").addEventListener("click", () => {
  const totalPages = state.meta?.totalPages || 1;
  if (state.page >= totalPages) return;
  state.page += 1;
  loadClients().catch(console.error);
});

document.getElementById("bulkApplyBtn").addEventListener("click", async () => {
  const action = document.getElementById("bulkActionSelect").value;
  const value = document.getElementById("bulkActionValue").value.trim();
  const clientIds = Array.from(state.selected);
  if (!action || !clientIds.length) return;
  const response = await fetch(`${API_BASE_URL}/clients/bulk`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ action, value, clientIds }),
  });
  if (!response.ok) return;
  state.selected.clear();
  await loadClients();
});

loadClients().catch((error) => {
  tableBody.innerHTML = "";
  emptyState.hidden = false;
  emptyState.textContent = error.message || "Failed to load clients.";
  renderKpi([]);
});
</script>
</body>
</html>
