<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Client Messages | Prospera Accountant Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<link rel="stylesheet" href="../shared/accountant-theme.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Segoe UI",Arial,sans-serif;
  background:#f8fafc;
  color:#0f172a;
}

.app-layout{display:flex;min-height:100vh;width:100%;}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:white;
  display:flex;
  flex-direction:column;
  position:fixed;
  height:100vh;
}
.sidebar-header{
  padding:22px;
  display:flex;
  gap:12px;
  align-items:center;
}
.sidebar-header i{font-size:30px;color:#60a5fa;}
.sidebar-header h1{font-size:16px;}
.sidebar-header p{font-size:12px;color:#94a3b8;}

.nav{padding:16px;flex:1;}
.nav a{
  display:flex;
  gap:12px;
  align-items:center;
  padding:12px 14px;
  border-radius:10px;
  color:#cbd5f5;
  text-decoration:none;
  margin-bottom:6px;
}
.nav a:hover{background:#1e293b;}
.nav a.active{background:#2563eb;color:white;}

.sidebar-footer{padding:16px;}
.user-box{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}
.role{color:#60a5fa;font-size:12px;}

.logout{
  width:100%;
  background:none;
  border:none;
  color:#cbd5f5;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  text-align:left;
}
.logout:hover{background:#1e293b;}

/* MAIN */
.page{
  flex:1;
  margin-left:260px;
  padding:24px;
}
.page h1{font-size:24px;font-weight:600;}
.page p{color:#64748b;margin-top:4px;}

.grid{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:24px;
  margin-top:24px;
  height:calc(100vh - 140px);
}

.card{
  background:white;
  border-radius:12px;
  border:1px solid #e5e7eb;
  display:flex;
  flex-direction:column;
}
.card-header{
  padding:16px 20px;
  border-bottom:1px solid #e5e7eb;
}
.card-content{
  padding:16px;
  flex:1;
  overflow-y:auto;
}

/* TABS */
.thread-filters{
  display:flex;
  gap:24px;
  margin-top:16px;
  border-bottom:1px solid #e5e7eb;
  padding-bottom:4px;
}
.thread-filter{
  background:none;
  border:none;
  padding:10px 0;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  color:#64748b;
  position:relative;
}
.thread-filter.active{
  color:#2563eb;
  font-weight:600;
}
.thread-filter.active::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:100%;
  height:3px;
  background:#2563eb;
  border-radius:3px 3px 0 0;
}

/* CLIENT LIST */
.client{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:8px;
  transition:0.2s;
}
.client:hover{background:#f9fafb;}
.client.active{
  background:#eff6ff;
  border-left:4px solid #2563eb;
}

.client-name{font-weight:500;font-size:14px;}
.client-meta{font-size:13px;color:#64748b;margin-top:2px;}
.badge{
  background:#ef4444;
  color:white;
  font-size:11px;
  padding:2px 6px;
  border-radius:12px;
  margin-left:6px;
}

.hidden{display:none !important;}

/* MESSAGE AREA */
.messages{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.message-row{display:flex;}
.message-row.own{justify-content:flex-end;}

.message-bubble{
  max-width:70%;
  padding:14px 16px;
  border-radius:14px;
  font-size:14px;
}
.message-bubble.own{
  background:#2563eb;
  color:white;
  border-bottom-right-radius:4px;
}
.message-bubble.other{
  background:#f1f5f9;
  border-bottom-left-radius:4px;
}
.meta{
  font-size:11px;
  margin-top:6px;
  opacity:0.8;
}

.input-area{
  border-top:1px solid #e5e7eb;
  padding:14px;
  display:flex;
  gap:10px;
}
.input-area input{
  flex:1;
  padding:12px 16px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

.sr-only{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}
.send-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:0 20px;
  border-radius:8px;
  cursor:pointer;
}
.empty{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
  color:#6b7280;
}

/* UX REFRESH */
.page {
  padding: 28px 30px 32px;
}

.page h1 {
  font-size: 30px;
  letter-spacing: -0.02em;
}

.grid {
  gap: 16px;
  margin-top: 18px;
  height: calc(100vh - 150px);
}

.card {
  border-radius: 16px;
  border-color: #dbe3f0;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
}

.card-header {
  padding: 18px 18px 14px;
}

.thread-filters {
  gap: 12px;
  border-bottom: none;
  padding-bottom: 0;
}

.thread-filter {
  border: 1px solid #dbe3f0;
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 12px;
  color: #334155;
}

.thread-filter.active {
  background: #0f172a;
  color: #f8fafc;
  border-color: #0f172a;
}

.thread-filter.active::after {
  display: none;
}

.client {
  border: 1px solid transparent;
}

.client.active {
  border-left: 1px solid #bfdbfe;
  border-color: #bfdbfe;
}

.message-bubble {
  border-radius: 12px;
}

.message-bubble.own {
  background: #1d4ed8;
}

.input-area {
  padding: 12px;
  background: #f8fafc;
}

.input-area input {
  background: #ffffff;
}

.tag-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.tag-chip {
  border: 1px solid #dbe3f0;
  background: #fff;
  color: #334155;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
}
.tag-chip.active {
  background: #0f172a;
  color: #f8fafc;
  border-color: #0f172a;
}
.thread-row-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.thread-tag {
  border: 1px solid #dbe3f0;
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 11px;
  color: #475569;
  background: #f8fafc;
}
.sla-chip {
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 11px;
  border: 1px solid transparent;
}
.sla-chip.overdue {
  background: #fee2e2;
  color: #b91c1c;
  border-color: #fecaca;
}
.sla-chip.due_soon {
  background: #fff7ed;
  color: #9a3412;
  border-color: #fed7aa;
}
.sla-chip.open {
  background: #eff6ff;
  color: #1d4ed8;
  border-color: #bfdbfe;
}
.composer-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.composer-row select, .composer-row input {
  height: 34px;
  border: 1px solid #dbe3f0;
  border-radius: 8px;
  padding: 0 10px;
  font-size: 12px;
}
.message-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.message-tag {
  background: #eff6ff;
  color: #1d4ed8;
  border-radius: 999px;
  padding: 2px 8px;
  font-size: 11px;
}
.message-doc-link {
  display: inline-block;
  margin-top: 8px;
  font-size: 12px;
  color: #1d4ed8;
}
</style>
<link rel="stylesheet" href="../shared/inline-migrated.css">
</head>

<aside class="sidebar">

    <i class="fa-solid fa-shield-halved"></i>
    <div>
      <h1>Prospera</h1>
      <p>Accountant Portal</p>
    </div>
  </div>

  <nav class="nav">

    <a href="clients.html"><i class="fa fa-users"></i> Clients</a>

  <div class="sidebar-footer">
    <div class="user-box">

<div class="card">
  <div class="card-header">

<script src="../shared/portal-config.js"></script>
<script src="../shared/portal-auth.js"></script>
<script src="../shared/client-ui.js"></script>
<script src="accountant-nav.js"></script>
<script>
const API_BASE_URL = window.PortalConfig?.API_BASE_URL || "http://127.0.0.1:4010/api";
const session = window.PortalAuth.requireRole("accountant", "accountant logins/login.html");
if (!session) throw new Error("Unauthorized");
const { token } = session;

const clientList = document.getElementById("clientList");
const chatArea = document.getElementById("chatArea");
const chatHeader = document.getElementById("chatHeader");
const inputArea = document.getElementById("inputArea");
const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const composerTag = document.getElementById("composerTag");
const composerDocSelect = document.getElementById("composerDocSelect");
const composerSlaHours = document.getElementById("composerSlaHours");
const threadTagFilters = document.getElementById("threadTagFilters");
const slaOverdueOnly = document.getElementById("slaOverdueOnly");

let threads = [];
let activeClientId = "";
let threadFilter = "assigned";
let pollTimer = null;
let activeTag = "all";
const threadState = new Map();

function authHeaders() {
  return window.PortalAuth.authHeaders(token);
}

function shortTime(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "-";
  return date.toLocaleString();
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function mapThread(item) {
  const last = item.lastMessage || null;
  const section = "assigned";
  return {
    id: item.clientId,
    name: item.clientName || item.clientId || "Client",
    company: `Client ID: ${item.clientId}`,
    section,
    unread: Number(item.unreadCount || 0),
    count: Number(item.count || 0),
    lastMessageAt: last?.createdAt || null,
    tags: Array.isArray(item.tags) ? item.tags : [],
    responseDueAt: item.responseDueAt || null,
    slaStatus: item.slaStatus || "none",
    messages: [],
  };
}

function renderClients() {
  const q = String(document.getElementById("clientSearchInput")?.value || "").trim().toLowerCase();
  clientList.innerHTML = "";
  const filtered = threads.filter((thread) => {
    if (threadFilter !== "all" && thread.section !== threadFilter) return false;
    if (activeTag !== "all" && !thread.tags.includes(activeTag)) return false;
    if (slaOverdueOnly.checked && thread.slaStatus !== "overdue") return false;
    if (!q) return true;
    return thread.name.toLowerCase().includes(q) || thread.company.toLowerCase().includes(q);
  });

  if (!filtered.length) {
    clientList.innerHTML = `<div class="empty"><h3>No conversations</h3></div>`;
    return;
  }

  filtered.forEach((thread) => {
    const div = document.createElement("div");
    div.className = `client ${thread.section}${thread.id === activeClientId ? " active" : ""}`;
    div.dataset.id = thread.id;
    div.innerHTML = `
      <div class="client-name">
        ${escapeHtml(thread.name)}
        ${thread.unread > 0 ? `<span class="badge">${thread.unread}</span>` : ""}
      </div>
      <div class="client-meta">${escapeHtml(thread.company)}</div>
      <div class="thread-row-meta">
        ${thread.tags.slice(0, 2).map((tag) => `<span class="thread-tag">${escapeHtml(tag.replace(/_/g, " "))}</span>`).join("")}
        ${thread.slaStatus && thread.slaStatus !== "none" && thread.slaStatus !== "met" ? `<span class="sla-chip ${thread.slaStatus}">${thread.slaStatus.replace(/_/g, " ")}</span>` : ""}
      </div>
    `;
    div.addEventListener("click", async () => {
      activeClientId = thread.id;
      await loadMessages(thread.id, { reset: true });
      await loadClientDocuments(thread.id);
      renderClients();
      renderActiveThread();
    });
    clientList.appendChild(div);
  });
}

function renderActiveThread() {
  const thread = threads.find((item) => item.id === activeClientId);
  if (!thread) {
    chatHeader.innerHTML = `<h3>Select a client</h3><p>Choose a client to view conversation</p>`;
    chatArea.innerHTML = `<div class="empty"><i class="fa fa-comments"></i><h3>No conversation selected</h3></div>`;
    inputArea.style.display = "none";
    return;
  }

  chatHeader.innerHTML = `
    <h3>${escapeHtml(thread.name)}</h3>
    <p>${escapeHtml(thread.company)} | ${thread.count} message(s)${thread.responseDueAt ? ` | Reply due ${shortTime(thread.responseDueAt)}` : ""}</p>
  `;
  inputArea.style.display = "flex";

  const state = threadState.get(thread.id) || { hasMore: false, loadingOlder: false };
  if (!thread.messages.length) {
    chatArea.innerHTML = `<div class="empty"><h3>No messages yet</h3><p>Start the conversation with this client.</p></div>`;
    return;
  }

  chatArea.innerHTML = "";
  const container = document.createElement("div");
  container.className = "messages";
  if (state.hasMore) {
    const olderBtn = document.createElement("button");
    olderBtn.className = "btn-outline";
    olderBtn.type = "button";
    olderBtn.textContent = state.loadingOlder ? "Loading..." : "Load older messages";
    olderBtn.disabled = state.loadingOlder;
    olderBtn.addEventListener("click", () => loadOlderMessages(thread.id));
    container.appendChild(olderBtn);
  }

  thread.messages.forEach((msg) => {
    const row = document.createElement("div");
    row.className = `message-row ${msg.from}`;
    row.innerHTML = `
      <div class="message-bubble ${msg.from}">
        ${escapeHtml(msg.text)}
        ${Array.isArray(msg.tags) && msg.tags.length ? `<div class="message-tags">${msg.tags.map((tag) => `<span class="message-tag">${escapeHtml(tag.replace(/_/g, " "))}</span>`).join("")}</div>` : ""}
        ${msg.linkedDocumentId ? `<a href="documentview.html?id=${encodeURIComponent(msg.linkedDocumentId)}" class="message-doc-link">Linked doc: ${escapeHtml(msg.linkedDocumentName || msg.linkedDocumentId)}</a>` : ""}
        <div class="meta">${msg.from === "own" ? "You" : escapeHtml(thread.name)} | ${shortTime(msg.createdAt)} | ${escapeHtml(msg.deliveryStatus || "sent")}</div>
      </div>
    `;
    container.appendChild(row);
  });
  chatArea.appendChild(container);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function loadThreads() {
  const response = await fetch(`${API_BASE_URL}/messages/threads`, { headers: authHeaders() });
  if (!response.ok) throw new Error("Failed to load message threads");
  const payload = await response.json();
  threads = Array.isArray(payload.items) ? payload.items.map(mapThread) : [];
  if (!activeClientId && threads.length) activeClientId = threads[0].id;
}

async function loadMessages(clientId, { reset = true } = {}) {
  const thread = threads.find((item) => item.id === clientId);
  if (!thread) return;
  const state = threadState.get(clientId) || { page: 1, hasMore: false, loadingOlder: false };
  const page = reset ? 1 : Math.max(1, state.page);
  const response = await fetch(`${API_BASE_URL}/messages/threads/${encodeURIComponent(clientId)}?page=${page}&limit=25`, { headers: authHeaders() });
  if (!response.ok) throw new Error("Failed to load messages");
  const payload = await response.json();
  const items = Array.isArray(payload.items) ? payload.items : [];
  const mapped = items.map((item) => ({
    id: item.id,
    from: item.fromUserId === session.user.id ? "own" : "other",
    text: item.body || "",
    createdAt: item.createdAt,
    deliveryStatus: item.deliveryStatus || "sent",
    tags: Array.isArray(item.tags) ? item.tags : [],
    linkedDocumentId: item.linkedDocumentId || "",
    linkedDocumentName: item.linkedDocumentName || "",
  }));
  if (reset) {
    thread.messages = mapped;
  } else {
    thread.messages = mapped.concat(thread.messages || []);
  }
  thread.count = Number(payload.pagination?.total || thread.messages.length);
  thread.unread = 0;
  threadState.set(clientId, { page, hasMore: Boolean(payload.pagination?.hasMore), loadingOlder: false });

  await fetch(`${API_BASE_URL}/messages/threads/${encodeURIComponent(clientId)}/read`, {
    method: "POST",
    headers: authHeaders(),
    body: "{}",
  }).catch(() => null);
}

async function loadOlderMessages(clientId) {
  const state = threadState.get(clientId);
  if (!state || !state.hasMore || state.loadingOlder) return;
  threadState.set(clientId, { ...state, loadingOlder: true, page: state.page + 1 });
  renderActiveThread();
  await loadMessages(clientId, { reset: false });
  renderActiveThread();
}

async function sendMessage() {
  const thread = threads.find((item) => item.id === activeClientId);
  if (!thread) return;
  const text = messageInput.value.trim();
  if (!text) return;
  const selectedTag = String(composerTag.value || "").trim();
  const tags = selectedTag ? [selectedTag] : [];
  const linkedDocumentId = String(composerDocSelect.value || "").trim();
  const slaHours = Math.max(1, Math.min(72, Number(composerSlaHours.value || 24)));
  const slaDueAt = new Date(Date.now() + (slaHours * 60 * 60 * 1000)).toISOString();
  const response = await fetch(`${API_BASE_URL}/messages/threads/${encodeURIComponent(thread.id)}`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ body: text, tags, linkedDocumentId, slaDueAt }),
  });
  if (!response.ok) throw new Error("Failed to send message");
  const payload = await response.json().catch(() => ({}));
  const message = payload.message || null;
  if (message) {
    thread.messages.push({
      id: message.id,
      from: "own",
      text: message.body || text,
      createdAt: message.createdAt || new Date().toISOString(),
      deliveryStatus: message.deliveryStatus || "sent",
      tags: Array.isArray(message.tags) ? message.tags : [],
      linkedDocumentId: message.linkedDocumentId || "",
      linkedDocumentName: message.linkedDocumentName || "",
    });
  } else {
    thread.messages.push({ id: `temp_${Date.now()}`, from: "own", text, createdAt: new Date().toISOString(), deliveryStatus: "sent", tags, linkedDocumentId });
  }
  messageInput.value = "";
  composerTag.value = "";
  renderActiveThread();
  renderClients();
}

async function pollActiveThread() {
  if (!activeClientId) return;
  const thread = threads.find((item) => item.id === activeClientId);
  if (!thread) return;
  const response = await fetch(`${API_BASE_URL}/messages/threads/${encodeURIComponent(activeClientId)}?page=1&limit=25`, { headers: authHeaders() });
  if (!response.ok) return;
  const payload = await response.json().catch(() => ({}));
  const items = Array.isArray(payload.items) ? payload.items : [];
  thread.messages = items.map((item) => ({
    id: item.id,
    from: item.fromUserId === session.user.id ? "own" : "other",
    text: item.body || "",
    createdAt: item.createdAt,
    deliveryStatus: item.deliveryStatus || "sent",
    tags: Array.isArray(item.tags) ? item.tags : [],
    linkedDocumentId: item.linkedDocumentId || "",
    linkedDocumentName: item.linkedDocumentName || "",
  }));
  thread.count = Number(payload.pagination?.total || thread.messages.length);
  thread.responseDueAt = payload.threadSla?.responseDueAt || null;
  thread.slaStatus = payload.threadSla?.slaStatus || thread.slaStatus;
  renderActiveThread();
  renderClients();
}

async function loadClientDocuments(clientId) {
  composerDocSelect.innerHTML = `<option value="">Attach document record...</option>`;
  if (!clientId) return;
  const response = await fetch(`${API_BASE_URL}/documents?clientId=${encodeURIComponent(clientId)}`, { headers: authHeaders() });
  if (!response.ok) return;
  const payload = await response.json().catch(() => ({}));
  const docs = Array.isArray(payload.items) ? payload.items : [];
  docs.slice(0, 80).forEach((doc) => {
    const option = document.createElement("option");
    option.value = doc.id;
    option.textContent = `${doc.name} (${doc.status})`;
    composerDocSelect.appendChild(option);
  });
}

document.querySelectorAll(".thread-filter").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".thread-filter").forEach((item) => item.classList.remove("active"));
    btn.classList.add("active");
    threadFilter = btn.dataset.tab === "all" ? "all" : btn.dataset.tab;
    renderClients();
  });
});
document.getElementById("clientSearchInput").addEventListener("input", renderClients);
threadTagFilters.addEventListener("click", (event) => {
  const button = event.target.closest("button[data-tag]");
  if (!button) return;
  activeTag = button.getAttribute("data-tag") || "all";
  threadTagFilters.querySelectorAll("button[data-tag]").forEach((item) => item.classList.remove("active"));
  button.classList.add("active");
  renderClients();
});
slaOverdueOnly.addEventListener("change", renderClients);
sendBtn.addEventListener("click", async () => {
  try { await sendMessage(); } catch (error) { if (window.ClientUI) window.ClientUI.toast(error.message || "Send failed", "error"); }
});
messageInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    event.preventDefault();
    sendBtn.click();
  }
});

(async () => {
  try {
    await loadThreads();
    if (activeClientId) await loadMessages(activeClientId, { reset: true });
    if (activeClientId) await loadClientDocuments(activeClientId);
    renderClients();
    renderActiveThread();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => { pollActiveThread().catch(() => {}); }, 15000);
  } catch (error) {
    chatArea.innerHTML = `<div class="empty"><h3>Failed to load messages</h3><p>${escapeHtml(error.message || "Try again later.")}</p></div>`;
  }
})();
</script>
