<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Client Messages | Prospera Accountant Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"Segoe UI",Arial,sans-serif;
  background:#f8fafc;
  color:#0f172a;
}

.app-layout{display:flex;min-height:100vh;width:100%;}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:linear-gradient(180deg,#0f172a,#020617);
  color:white;
  display:flex;
  flex-direction:column;
  position:fixed;
  height:100vh;
}
.sidebar-header{
  padding:22px;
  display:flex;
  gap:12px;
  align-items:center;
}
.sidebar-header i{font-size:30px;color:#60a5fa;}
.sidebar-header h1{font-size:16px;}
.sidebar-header p{font-size:12px;color:#94a3b8;}

.nav{padding:16px;flex:1;}
.nav a{
  display:flex;
  gap:12px;
  align-items:center;
  padding:12px 14px;
  border-radius:10px;
  color:#cbd5f5;
  text-decoration:none;
  margin-bottom:6px;
}
.nav a:hover{background:#1e293b;}
.nav a.active{background:#2563eb;color:white;}

.sidebar-footer{padding:16px;}
.user-box{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
}
.role{color:#60a5fa;font-size:12px;}

.logout{
  width:100%;
  background:none;
  border:none;
  color:#cbd5f5;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  text-align:left;
}
.logout:hover{background:#1e293b;}

/* MAIN */
.page{
  flex:1;
  margin-left:260px;
  padding:24px;
}
.page h1{font-size:24px;font-weight:600;}
.page p{color:#64748b;margin-top:4px;}

.grid{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:24px;
  margin-top:24px;
  height:calc(100vh - 140px);
}

.card{
  background:white;
  border-radius:12px;
  border:1px solid #e5e7eb;
  display:flex;
  flex-direction:column;
}
.card-header{
  padding:16px 20px;
  border-bottom:1px solid #e5e7eb;
}
.card-content{
  padding:16px;
  flex:1;
  overflow-y:auto;
}

/* TABS */
.thread-filters{
  display:flex;
  gap:24px;
  margin-top:16px;
  border-bottom:1px solid #e5e7eb;
  padding-bottom:4px;
}
.thread-filter{
  background:none;
  border:none;
  padding:10px 0;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  color:#64748b;
  position:relative;
}
.thread-filter.active{
  color:#2563eb;
  font-weight:600;
}
.thread-filter.active::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:100%;
  height:3px;
  background:#2563eb;
  border-radius:3px 3px 0 0;
}

/* CLIENT LIST */
.client{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:8px;
  transition:0.2s;
}
.client:hover{background:#f9fafb;}
.client.active{
  background:#eff6ff;
  border-left:4px solid #2563eb;
}

.client-name{font-weight:500;font-size:14px;}
.client-meta{font-size:13px;color:#64748b;margin-top:2px;}
.badge{
  background:#ef4444;
  color:white;
  font-size:11px;
  padding:2px 6px;
  border-radius:12px;
  margin-left:6px;
}

.hidden{display:none !important;}

/* MESSAGE AREA */
.messages{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.message-row{display:flex;}
.message-row.own{justify-content:flex-end;}

.message-bubble{
  max-width:70%;
  padding:14px 16px;
  border-radius:14px;
  font-size:14px;
}
.message-bubble.own{
  background:#2563eb;
  color:white;
  border-bottom-right-radius:4px;
}
.message-bubble.other{
  background:#f1f5f9;
  border-bottom-left-radius:4px;
}
.meta{
  font-size:11px;
  margin-top:6px;
  opacity:0.8;
}

.input-area{
  border-top:1px solid #e5e7eb;
  padding:14px;
  display:flex;
  gap:10px;
}
.input-area input{
  flex:1;
  padding:12px 16px;
  border-radius:8px;
  border:1px solid #d1d5db;
}

.sr-only{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}
.send-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:0 20px;
  border-radius:8px;
  cursor:pointer;
}
.empty{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100%;
  color:#6b7280;
}
</style>
  <script defer src="accountant-nav.js"></script>
<link rel="stylesheet" href="../shared/inline-migrated.css">
</head>

<body>

<div class="app-layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <i class="fa-solid fa-shield-halved"></i>
    <div>
      <h1>Prospera</h1>
      <p>Accountant Portal</p>
    </div>
  </div>

  <nav class="nav">
    <a href="dashboards.html"><i class="fa fa-chart-line"></i> Dashboard</a>
    <a href="clients.html"><i class="fa fa-users"></i> Clients</a>
    <a href="documents.html"><i class="fa fa-file"></i> Documents</a>
     <a href="tasks.html" ><i class="fa fa-tasks"></i> Tasks</a>
    <a href="messages.html" class="active"><i class="fa fa-message"></i> Messages</a>
    <a href="settings.html"><i class="fa fa-gear"></i> Settings</a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-box">
      <p><strong>Sarah Johnson</strong></p>
      <p>sarah@prospera.com</p>
      <p class="role">Primary Accountant</p>
    </div>
    <button type="button" class="logout"><i class="fa fa-sign-out"></i> Logout</button>
  </div>
</aside>

<!-- MAIN -->
<main class="page">
<h1>Client Messages</h1>
<p>Communicate securely with your assigned clients</p>

<div class="grid">

<!-- CLIENT LIST -->
<div class="card">
  <div class="card-header">
    <h2>Your Clients</h2>
    <div class="thread-filters">
      <button type="button" class="thread-filter active" data-tab="assigned">Assigned Clients</button>
      <button type="button" class="thread-filter" data-tab="support">Internal Support</button>
      <button type="button" class="thread-filter" data-tab="archived">Archived</button>
    </div>
    <div style="margin-top:10px;">
      <label class="sr-only" for="clientSearchInput">Search clients</label>
      <input id="clientSearchInput" placeholder="Search clients..." style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:8px;">
    </div>
  </div>

  <div class="card-content" id="clientList"></div>
</div>

<!-- MESSAGE VIEW -->
<div class="card">
  <div class="card-header" id="chatHeader">
    <h3>Select a client</h3>
    <p>Choose a client to view conversation</p>
  </div>

  <div class="card-content" id="chatArea">
    <div class="empty">
      <i class="fa fa-comments"></i>
      <h3>No conversation selected</h3>
    </div>
  </div>

  <div class="input-area inl-cb45893012" id="inputArea">
    <label for="messageInput" class="sr-only">Type your message reply</label>
    <input id="messageInput" placeholder="Type your reply..." aria-label="Type your message reply" />
    <button type="button" class="send-btn" id="sendBtn" aria-label="Send message" title="Send message">
      <i class="fa fa-paper-plane"></i>
    </button>
  </div>
</div>

</div>
</main>
</div>

<script src="../shared/portal-config.js"></script>
<script src="../shared/portal-auth.js"></script>
<script src="../shared/client-ui.js"></script>
<script src="accountant-nav.js"></script>
<script>
const API_BASE_URL = window.PortalConfig?.API_BASE_URL || "http://127.0.0.1:4010/api";
const session = window.PortalAuth.requireRole("accountant", "accountant logins/login.html");
if (!session) throw new Error("Unauthorized");
const { token } = session;

const clientList = document.getElementById("clientList");
const chatArea = document.getElementById("chatArea");
const chatHeader = document.getElementById("chatHeader");
const inputArea = document.getElementById("inputArea");
const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");

let threads = [];
let activeClientId = "";
let threadFilter = "assigned";
let pollTimer = null;
const threadState = new Map();

function authHeaders() {
  return window.PortalAuth.authHeaders(token);
}

function shortTime(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "-";
  return date.toLocaleString();
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function mapThread(item) {
  const last = item.lastMessage || null;
  const section = "assigned";
  return {
    id: item.clientId,
    name: item.clientName || item.clientId || "Client",
    company: `Client ID: ${item.clientId}`,
    section,
    unread: Number(item.unreadCount || 0),
    count: Number(item.count || 0),
    lastMessageAt: last?.createdAt || null,
    messages: [],
  };
}

function renderClients() {
  const q = String(document.getElementById("clientSearchInput")?.value || "").trim().toLowerCase();
  clientList.innerHTML = "";
  const filtered = threads.filter((thread) => {
    if (threadFilter !== "all" && thread.section !== threadFilter) return false;
    if (!q) return true;
    return thread.name.toLowerCase().includes(q) || thread.company.toLowerCase().includes(q);
  });

  if (!filtered.length) {
    clientList.innerHTML = `<div class="empty"><h3>No conversations</h3></div>`;
    return;
  }

  filtered.forEach((thread) => {
    const div = document.createElement("div");
    div.className = `client ${thread.section}${thread.id === activeClientId ? " active" : ""}`;
    div.dataset.id = thread.id;
    div.innerHTML = `
      <div class="client-name">
        ${escapeHtml(thread.name)}
        ${thread.unread > 0 ? `<span class="badge">${thread.unread}</span>` : ""}
      </div>
      <div class="client-meta">${escapeHtml(thread.company)}</div>
    `;
    div.addEventListener("click", async () => {
      activeClientId = thread.id;
      await loadMessages(thread.id, { reset: true });
      renderClients();
      renderActiveThread();
    });
    clientList.appendChild(div);
  });
}

function renderActiveThread() {
  const thread = threads.find((item) => item.id === activeClientId);
  if (!thread) {
    chatHeader.innerHTML = `<h3>Select a client</h3><p>Choose a client to view conversation</p>`;
    chatArea.innerHTML = `<div class="empty"><i class="fa fa-comments"></i><h3>No conversation selected</h3></div>`;
    inputArea.style.display = "none";
    return;
  }

  chatHeader.innerHTML = `
    <h3>${escapeHtml(thread.name)}</h3>
    <p>${escapeHtml(thread.company)} • ${thread.count} message(s)</p>
  `;
  inputArea.style.display = "flex";

  const state = threadState.get(thread.id) || { hasMore: false, loadingOlder: false };
  if (!thread.messages.length) {
    chatArea.innerHTML = `<div class="empty"><h3>No messages yet</h3><p>Start the conversation with this client.</p></div>`;
    return;
  }

  chatArea.innerHTML = "";
  const container = document.createElement("div");
  container.className = "messages";
  if (state.hasMore) {
    const olderBtn = document.createElement("button");
    olderBtn.className = "btn-outline";
    olderBtn.type = "button";
    olderBtn.textContent = state.loadingOlder ? "Loading..." : "Load older messages";
    olderBtn.disabled = state.loadingOlder;
    olderBtn.addEventListener("click", () => loadOlderMessages(thread.id));
    container.appendChild(olderBtn);
  }

  thread.messages.forEach((msg) => {
    const row = document.createElement("div");
    row.className = `message-row ${msg.from}`;
    row.innerHTML = `
      <div class="message-bubble ${msg.from}">
        ${escapeHtml(msg.text)}
        <div class="meta">${msg.from === "own" ? "You" : escapeHtml(thread.name)} • ${shortTime(msg.createdAt)} • ${escapeHtml(msg.deliveryStatus || "sent")}</div>
      </div>
    `;
    container.appendChild(row);
  });
  chatArea.appendChild(container);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function loadThreads() {
  const response = await fetch(`${API_BASE_URL}/messages/threads`, { headers: authHeaders() });
  if (!response.ok) throw new Error("Failed to load message threads");
  const payload = await response.json();
  threads = Array.isArray(payload.items) ? payload.items.map(mapThread) : [];
  if (!activeClientId && threads.length) activeClientId = threads[0].id;
}

async function loadMessages(clientId, { reset = true } = {}) {
  const thread = threads.find((item) => item.id === clientId);
  if (!thread) return;
  const state = threadState.get(clientId) || { page: 1, hasMore: false, loadingOlder: false };
  const page = reset ? 1 : Math.max(1, state.page);
  const response = await fetch(`${API_BASE_URL}/messages/threads/${encodeURIComponent(clientId)}?page=${page}&limit=25`, { headers: authHeaders() });
  if (!response.ok) throw new Error("Failed to load messages");
  const payload = await response.json();
  const items = Array.isArray(payload.items) ? payload.items : [];
  const mapped = items.map((item) => ({
    id: item.id,
    from: item.fromUserId === session.user.id ? "own" : "other",
    text: item.body || "",
    createdAt: item.createdAt,
    deliveryStatus: item.deliveryStatus || "sent",
  }));
  if (reset) {
    thread.messages = mapped;
  } else {
    thread.messages = mapped.concat(thread.messages || []);
  }
  thread.count = Number(payload.pagination?.total || thread.messages.length);
  thread.unread = 0;
  threadState.set(clientId, { page, hasMore: Boolean(payload.pagination?.hasMore), loadingOlder: false });

  await fetch(`${API_BASE_URL}/messages/threads/${encodeURIComponent(clientId)}/read`, {
    method: "POST",
    headers: authHeaders(),
    body: "{}",
  }).catch(() => null);
}

async function loadOlderMessages(clientId) {
  const state = threadState.get(clientId);
  if (!state || !state.hasMore || state.loadingOlder) return;
  threadState.set(clientId, { ...state, loadingOlder: true, page: state.page + 1 });
  renderActiveThread();
  await loadMessages(clientId, { reset: false });
  renderActiveThread();
}

async function sendMessage() {
  const thread = threads.find((item) => item.id === activeClientId);
  if (!thread) return;
  const text = messageInput.value.trim();
  if (!text) return;
  const response = await fetch(`${API_BASE_URL}/messages/threads/${encodeURIComponent(thread.id)}`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ body: text }),
  });
  if (!response.ok) throw new Error("Failed to send message");
  const payload = await response.json().catch(() => ({}));
  const message = payload.message || null;
  if (message) {
    thread.messages.push({
      id: message.id,
      from: "own",
      text: message.body || text,
      createdAt: message.createdAt || new Date().toISOString(),
      deliveryStatus: message.deliveryStatus || "sent",
    });
  } else {
    thread.messages.push({ id: `temp_${Date.now()}`, from: "own", text, createdAt: new Date().toISOString(), deliveryStatus: "sent" });
  }
  messageInput.value = "";
  renderActiveThread();
  renderClients();
}

async function pollActiveThread() {
  if (!activeClientId) return;
  const thread = threads.find((item) => item.id === activeClientId);
  if (!thread) return;
  const response = await fetch(`${API_BASE_URL}/messages/threads/${encodeURIComponent(activeClientId)}?page=1&limit=25`, { headers: authHeaders() });
  if (!response.ok) return;
  const payload = await response.json().catch(() => ({}));
  const items = Array.isArray(payload.items) ? payload.items : [];
  thread.messages = items.map((item) => ({
    id: item.id,
    from: item.fromUserId === session.user.id ? "own" : "other",
    text: item.body || "",
    createdAt: item.createdAt,
    deliveryStatus: item.deliveryStatus || "sent",
  }));
  thread.count = Number(payload.pagination?.total || thread.messages.length);
  renderActiveThread();
  renderClients();
}

document.querySelectorAll(".thread-filter").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".thread-filter").forEach((item) => item.classList.remove("active"));
    btn.classList.add("active");
    threadFilter = btn.dataset.tab === "all" ? "all" : btn.dataset.tab;
    renderClients();
  });
});
document.getElementById("clientSearchInput").addEventListener("input", renderClients);
sendBtn.addEventListener("click", async () => {
  try { await sendMessage(); } catch (error) { if (window.ClientUI) window.ClientUI.toast(error.message || "Send failed", "error"); }
});
messageInput.addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    event.preventDefault();
    sendBtn.click();
  }
});

(async () => {
  try {
    await loadThreads();
    if (activeClientId) await loadMessages(activeClientId, { reset: true });
    renderClients();
    renderActiveThread();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => { pollActiveThread().catch(() => {}); }, 15000);
  } catch (error) {
    chatArea.innerHTML = `<div class="empty"><h3>Failed to load messages</h3><p>${escapeHtml(error.message || "Try again later.")}</p></div>`;
  }
})();
</script>

</body>
</html>
