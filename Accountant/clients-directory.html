<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Directory | Prospera</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../shared/accountant-theme.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Public Sans", Arial, sans-serif; background: #f6f8fc; color: #0f172a; }
    .page { padding: 24px 30px; margin-left: 260px; min-height: 100vh; }
    .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 12px; }
    .title-row h1 { margin: 0; font-size: 30px; letter-spacing: -0.02em; }
    .title-row p { margin: 6px 0 0; color: #64748b; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .input, .select, .btn { height: 40px; border-radius: 10px; border: 1px solid #dbe3f0; background: #fff; padding: 0 12px; }
    .input { min-width: 260px; }
    .btn { cursor: pointer; font-weight: 600; }
    .btn.primary { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    .card { background: #fff; border: 1px solid #dbe3f0; border-radius: 14px; box-shadow: 0 8px 18px rgba(15,23,42,.05); overflow: hidden; }
    .table-wrap { overflow: auto; max-height: calc(100vh - 250px); }
    table { border-collapse: collapse; width: 100%; min-width: 900px; }
    thead th { position: sticky; top: 0; background: #f8fafc; border-bottom: 1px solid #dbe3f0; color: #64748b; text-transform: uppercase; letter-spacing: .04em; font-size: 12px; padding: 12px 14px; text-align: left; }
    tbody td { border-bottom: 1px solid #eef2f7; padding: 12px 14px; font-size: 14px; }
    .pill { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .pill.active { background: #dcfce7; color: #166534; }
    .pill.pending { background: #fef3c7; color: #92400e; }
    .pill.risk { background: #fee2e2; color: #b91c1c; }
    .action-row { display: flex; gap: 6px; }
    .icon-btn { width: 34px; height: 34px; border: 1px solid #dbe3f0; border-radius: 8px; background: #fff; cursor: pointer; }
    .pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-top: 1px solid #dbe3f0; background: #f8fafc; }
    .pages { display: flex; gap: 6px; }
    .page-btn { width: 32px; height: 32px; border: 1px solid #dbe3f0; border-radius: 8px; background: #fff; cursor: pointer; }
    .page-btn.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    .muted { color: #64748b; font-size: 13px; }
    @media (max-width: 900px) { .page { margin-left: 0; padding: 20px 16px; } }
  </style>
  <script defer src="accountant-nav.js"></script>
</head>
<body>
<main class="page">
  <section class="title-row">
    <div>
      <h1>Client Directory</h1>
      <p>Complete client listing with status, health, and quick actions.</p>
    </div>
    <button id="backBtn" class="btn" type="button"><i class="fa-solid fa-arrow-left"></i> Back to Clients</button>
  </section>

  <section class="toolbar">
    <input id="searchInput" class="input" placeholder="Search clients..." aria-label="Search clients">
    <select id="statusFilter" class="select" aria-label="Filter by status">
      <option value="">All Status</option>
      <option value="active">Active</option>
      <option value="pending">Pending</option>
      <option value="at-risk">At Risk</option>
    </select>
    <select id="sortBy" class="select" aria-label="Sort by">
      <option value="name">Sort: Name</option>
      <option value="health_desc">Sort: Health high to low</option>
      <option value="health_asc">Sort: Health low to high</option>
      <option value="created_desc">Sort: Newest</option>
      <option value="created_asc">Sort: Oldest</option>
    </select>
    <button id="refreshBtn" class="btn primary" type="button"><i class="fa-solid fa-rotate"></i> Refresh</button>
  </section>

  <section class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Entity</th>
            <th>Contact</th>
            <th>Email</th>
            <th>Status</th>
            <th>Health</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="muted" id="showingText">Showing 0-0 of 0</div>
      <div class="pages">
        <button id="prevBtn" class="page-btn" type="button"><i class="fa-solid fa-chevron-left"></i></button>
        <div id="pages"></div>
        <button id="nextBtn" class="page-btn" type="button"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </div>
  </section>
</main>

<script src="../shared/portal-config.js"></script>
<script src="../shared/portal-auth.js"></script>
<script>
const API_BASE_URL = window.PortalConfig?.API_BASE_URL || "http://127.0.0.1:4010/api";
const session = window.PortalAuth.requireRole("accountant", "accountant logins/login.html");
if (!session) throw new Error("Unauthorized");

const ROWS_PER_PAGE = 10;
const state = { clients: [], page: 1 };

const tableBody = document.getElementById("tableBody");
const pagesWrap = document.getElementById("pages");
const showingText = document.getElementById("showingText");

function authHeaders() { return window.PortalAuth.authHeaders(session.token); }
function esc(v) { return String(v || "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[m])); }
function dateFmt(v) { const d = new Date(v); return Number.isNaN(d.getTime()) ? "-" : d.toLocaleDateString(); }
function statusClass(v) { const s = String(v || "").toLowerCase(); return s === "active" ? "active" : s === "pending" ? "pending" : "risk"; }

function applyFilters() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const status = document.getElementById("statusFilter").value.toLowerCase();
  const sortBy = document.getElementById("sortBy").value;

  let items = state.clients.filter((client) => {
    const statusOk = !status || String(client.status || "").toLowerCase() === status;
    if (!statusOk) return false;
    if (!q) return true;
    return [client.name, client.primaryContact, client.entityType, client.email, client.id].some((value) =>
      String(value || "").toLowerCase().includes(q)
    );
  });

  if (sortBy === "name") items.sort((a, b) => String(a.name || "").localeCompare(String(b.name || "")));
  if (sortBy === "health_desc") items.sort((a, b) => Number(b.complianceHealth || 0) - Number(a.complianceHealth || 0));
  if (sortBy === "health_asc") items.sort((a, b) => Number(a.complianceHealth || 0) - Number(b.complianceHealth || 0));
  if (sortBy === "created_desc") items.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  if (sortBy === "created_asc") items.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

  return items;
}

function render() {
  const filtered = applyFilters();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / ROWS_PER_PAGE));
  if (state.page > totalPages) state.page = totalPages;
  const start = (state.page - 1) * ROWS_PER_PAGE;
  const end = Math.min(start + ROWS_PER_PAGE, total);
  const pageItems = filtered.slice(start, end);

  tableBody.innerHTML = pageItems.map((client) => `
    <tr>
      <td><strong>${esc(client.name)}</strong><br><span class="muted">${esc(client.id)}</span></td>
      <td>${esc(client.entityType)}</td>
      <td>${esc(client.primaryContact)}</td>
      <td>${esc(client.email)}</td>
      <td><span class="pill ${statusClass(client.status)}">${esc(client.status)}</span></td>
      <td>${Number(client.complianceHealth || 0)}%</td>
      <td>${dateFmt(client.createdAt)}</td>
      <td>
        <div class="action-row">
          <button class="icon-btn" type="button" data-profile="${esc(client.id)}" title="Open profile"><i class="fa-solid fa-user"></i></button>
          <button class="icon-btn" type="button" data-docs="${esc(client.id)}" title="Open documents"><i class="fa-solid fa-file-lines"></i></button>
        </div>
      </td>
    </tr>
  `).join("");

  showingText.textContent = `Showing ${total ? start + 1 : 0}-${end} of ${total}`;
  document.getElementById("prevBtn").disabled = state.page <= 1;
  document.getElementById("nextBtn").disabled = state.page >= totalPages;

  pagesWrap.innerHTML = "";
  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = `page-btn${i === state.page ? " active" : ""}`;
    btn.textContent = i;
    btn.addEventListener("click", () => { state.page = i; render(); });
    pagesWrap.appendChild(btn);
  }
}

async function loadClients() {
  const response = await fetch(`${API_BASE_URL}/clients`, { headers: authHeaders() });
  if (!response.ok) throw new Error("Failed to load clients");
  const payload = await response.json().catch(() => ({}));
  state.clients = Array.isArray(payload.items) ? payload.items : [];
  render();
}

document.getElementById("backBtn").addEventListener("click", () => { window.location.href = "clients.html"; });
document.getElementById("searchInput").addEventListener("input", () => { state.page = 1; render(); });
document.getElementById("statusFilter").addEventListener("change", () => { state.page = 1; render(); });
document.getElementById("sortBy").addEventListener("change", () => { state.page = 1; render(); });
document.getElementById("refreshBtn").addEventListener("click", () => loadClients().catch(console.error));
document.getElementById("prevBtn").addEventListener("click", () => { state.page -= 1; render(); });
document.getElementById("nextBtn").addEventListener("click", () => { state.page += 1; render(); });

document.addEventListener("click", (event) => {
  const profileBtn = event.target.closest("[data-profile]");
  if (profileBtn) {
    window.location.href = `client-profile.html?id=${encodeURIComponent(profileBtn.getAttribute("data-profile"))}`;
    return;
  }
  const docsBtn = event.target.closest("[data-docs]");
  if (docsBtn) {
    window.location.href = `documents.html?clientId=${encodeURIComponent(docsBtn.getAttribute("data-docs"))}`;
  }
});

loadClients().catch((error) => {
  tableBody.innerHTML = `<tr><td colspan="8" style="padding:18px;color:#b91c1c;">${esc(error.message || "Failed to load clients")}</td></tr>`;
  showingText.textContent = "Showing 0-0 of 0";
});
</script>
</body>
</html>
