<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alerts</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", "Segoe UI", sans-serif;
}

body {
  background: #f8fafc;
  color: #0f172a;
  padding: 30px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h1 {
  font-size: 24px;
  font-weight: 600;
}

p {
  font-size: 14px;
  color: #64748b;
}

button {
  cursor: pointer;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
}

.btn-outline {
  background: white;
  border: 1px solid #e2e8f0;
}

.btn-outline:hover {
  background: #f1f5f9;
}

.btn-ghost {
  background: transparent;
  color: #64748b;
}

.btn-ghost:hover {
  background: #f1f5f9;
}

/* =========================
   SUMMARY CARDS
========================= */
.grid-3 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 20px;
}

.summary-card {
  display: flex;
  align-items: center;
  gap: 15px;
}

.summary-icon {
  width: 50px;
  height: 50px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.critical-bg { background: #fee2e2; color: #ef4444; }
.warning-bg { background: #fef3c7; color: #f59e0b; }
.success-bg { background: #dcfce7; color: #10b981; }

.summary-number {
  font-size: 22px;
  font-weight: 700;
}

.summary-label {
  font-size: 11px;
  text-transform: uppercase;
  color: #64748b;
}

/* =========================
   TABS
========================= */
.tabs {
  margin-top: 30px;
}

.tab-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.tab-btn {
  padding: 8px 14px;
  background: #f1f5f9;
  border-radius: 8px;
  font-size: 13px;
}

.tab-btn.active {
  background: white;
  border: 1px solid #e2e8f0;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* =========================
   ALERT CARDS
========================= */
.alert-card {
  display: flex;
  gap: 15px;
  padding: 16px;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  margin-bottom: 15px;
  background: white;
}

.alert-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.critical-icon { background: #fee2e2; color: #ef4444; }
.warning-icon { background: #fef3c7; color: #f59e0b; }
.info-icon { background: #dbeafe; color: #3b82f6; }

.alert-content {
  flex: 1;
}

.alert-title {
  font-weight: 600;
  font-size: 14px;
}

.badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid;
  margin-left: 6px;
}

.badge-critical { background: #fee2e2; color: #ef4444; border-color: #fecaca; }
.badge-warning { background: #fef3c7; color: #f59e0b; border-color: #fde68a; }
.badge-info { background: #dbeafe; color: #3b82f6; border-color: #bfdbfe; }

.alert-meta {
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
  display: flex;
  gap: 15px;
}

.alert-actions {
  display: flex;
  gap: 8px;
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: #64748b;
}

</style>
</head>
<body>

<div class="container">

  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <h1>Alerts</h1>
      <p>Actionable notifications across all clients.</p>
    </div>
    <button class="btn-outline" id="dismissAll">Dismiss All</button>
  </div>

  <!-- SUMMARY -->
  <div class="grid-3">
    <div class="card summary-card">
      <div class="summary-icon critical-bg"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div>
        <div class="summary-number" id="criticalCount">0</div>
        <div class="summary-label">Critical</div>
      </div>
    </div>

    <div class="card summary-card">
      <div class="summary-icon warning-bg"><i class="fa-solid fa-bell"></i></div>
      <div>
        <div class="summary-number" id="warningCount">0</div>
        <div class="summary-label">Warnings</div>
      </div>
    </div>

    <div class="card summary-card">
      <div class="summary-icon success-bg"><i class="fa-solid fa-circle-check"></i></div>
      <div>
        <div class="summary-number" id="resolvedCount">0</div>
        <div class="summary-label">Resolved</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="all">All</button>
      <button class="tab-btn" data-tab="missing">Missing</button>
      <button class="tab-btn" data-tab="expiring">Expiring</button>
      <button class="tab-btn" data-tab="overdue">Overdue</button>
      <button class="tab-btn" data-tab="security">Security</button>
    </div>

    <div id="alertsContainer"></div>
  </div>

</div>

<script>

const alerts = [
  {id:"1", type:"missing", title:"Missing bank statement", desc:"December 2025 statement not uploaded", client:"Delta Systems", time:"5 hours ago", severity:"critical"},
  {id:"2", type:"expiring", title:"Contract expiring soon", desc:"NDA expires in 15 days", client:"BlueOcean Ltd", time:"1 day ago", severity:"warning"},
  {id:"3", type:"rejected", title:"Invoice rejected", desc:"INV-1039 requires corrections", client:"Delta Systems", time:"2 days ago", severity:"critical"},
  {id:"4", type:"security", title:"Failed login attempts", desc:"3 failed attempts detected", client:"System", time:"6 hours ago", severity:"info"}
];

let dismissed = new Set();
let activeTab = "all";

function renderAlerts() {
  const container = document.getElementById("alertsContainer");
  container.innerHTML = "";

  const filtered = alerts.filter(a => !dismissed.has(a.id))
                         .filter(a => activeTab === "all" || a.type === activeTab);

  if(filtered.length === 0){
    container.innerHTML = `
      <div class="card empty-state">
        <i class="fa-solid fa-circle-check fa-2x"></i>
        <p>All clear. No alerts here.</p>
      </div>`;
    updateCounts();
    return;
  }

  filtered.forEach(alert => {
    const div = document.createElement("div");
    div.className = "alert-card";

    div.innerHTML = `
      <div class="alert-icon ${alert.severity}-icon">
        <i class="fa-solid fa-exclamation"></i>
      </div>
      <div class="alert-content">
        <div class="alert-title">
          ${alert.title}
          <span class="badge badge-${alert.severity}">${alert.severity}</span>
        </div>
        <div>${alert.desc}</div>
        <div class="alert-meta">
          <span><i class="fa-solid fa-building"></i> ${alert.client}</span>
          <span><i class="fa-solid fa-clock"></i> ${alert.time}</span>
        </div>
      </div>
      <div class="alert-actions">
        <button class="btn-outline">Take Action</button>
        <button class="btn-ghost" onclick="dismiss('${alert.id}')">Dismiss</button>
      </div>
    `;
    container.appendChild(div);
  });

  updateCounts();
}

function dismiss(id){
  dismissed.add(id);
  renderAlerts();
}

function updateCounts(){
  const active = alerts.filter(a => !dismissed.has(a.id));
  document.getElementById("criticalCount").textContent =
    active.filter(a => a.severity === "critical").length;
  document.getElementById("warningCount").textContent =
    active.filter(a => a.severity === "warning").length;
  document.getElementById("resolvedCount").textContent =
    dismissed.size;
}

document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeTab = btn.dataset.tab;
    renderAlerts();
  });
});

document.getElementById("dismissAll").addEventListener("click", ()=>{
  alerts.forEach(a => dismissed.add(a.id));
  renderAlerts();
});

renderAlerts();

</script>

</body>
</html>
