<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password | Accountant Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f6f6f8;margin:0;display:grid;place-items:center;min-height:100vh;color:#0f172a}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 10px 28px rgba(2,6,23,.08);width:min(520px,92vw);padding:30px}
h1{margin:0 0 6px;font-size:26px}.sub{color:#64748b;margin:0 0 18px}
label{display:block;font-weight:700;font-size:14px;margin:12px 0 6px}
input{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:10px}
input:focus{outline:none;border-color:#2563eb}
.btn{margin-top:14px;width:100%;border:none;border-radius:10px;background:#2563eb;color:#fff;padding:12px;font-weight:700;cursor:pointer}
.msg{min-height:20px;margin-top:10px;font-size:13px}.err{color:#b91c1c}.ok{color:#166534}
.back{display:inline-block;margin-top:12px;color:#2563eb;text-decoration:none;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <h1>Set New Password</h1>
    <p class="sub">Use your reset token to create a new password.</p>
    <form id="resetForm">
      <label for="token">Reset Token</label>
      <input id="token" required>
      <label for="password">New Password</label>
      <input id="password" type="password" minlength="8" required>
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" minlength="8" required>
      <button class="btn" id="resetBtn" type="submit">Update Password</button>
      <p class="msg" id="message"></p>
    </form>
    <a class="back" href="login.html"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
  </div>

<script src="../../shared/portal-config.js"></script>
<script>
const API_BASE_URL = (window.PortalConfig && window.PortalConfig.API_BASE_URL)
  ? window.PortalConfig.API_BASE_URL
  : "http://127.0.0.1:4010/api";

const params = new URLSearchParams(window.location.search);
const tokenInput = document.getElementById("token");
tokenInput.value = params.get("token") || "";

document.getElementById("resetForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const message = document.getElementById("message");
  const resetBtn = document.getElementById("resetBtn");
  const token = tokenInput.value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  if (password !== confirmPassword) {
    message.className = "msg err";
    message.textContent = "Passwords do not match.";
    return;
  }

  resetBtn.disabled = true;
  message.className = "msg";
  message.textContent = "Updating password...";
  try {
    const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, newPassword: password })
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(data.error || "Failed to update password");
    message.className = "msg ok";
    message.textContent = "Password updated. Redirecting to login...";
    setTimeout(() => { window.location.href = "login.html"; }, 1000);
  } catch (error) {
    message.className = "msg err";
    message.textContent = error.message || "Failed to update password.";
  } finally {
    resetBtn.disabled = false;
  }
});
</script>
</body>
</html>
