<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Reset Token | Accountant Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f6fb;font-family:Arial,Helvetica,sans-serif;color:#0f172a}
.card{width:min(500px,92vw);background:#fff;border:1px solid #dbe3f0;border-radius:14px;box-shadow:0 14px 32px rgba(2,6,23,.1);padding:28px}
h1{margin:0 0 6px;font-size:28px}.sub{margin:0 0 16px;color:#64748b}
label{display:block;font-size:13px;font-weight:700;color:#334155;margin:10px 0 6px}
input{width:100%;height:42px;border:1px solid #dbe3f0;border-radius:10px;padding:0 12px}
input:focus{outline:none;border-color:#1d4ed8}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{height:40px;border-radius:10px;border:1px solid #dbe3f0;background:#fff;padding:0 14px;cursor:pointer;font-weight:700}
.btn.primary{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.msg{min-height:20px;margin-top:8px;font-size:13px}
.msg.error{color:#b91c1c}.msg.ok{color:#166534}
a{color:#1d4ed8;text-decoration:none;font-weight:700}
</style>
</head>
<body>
<section class="card">
  <h1>Verify Reset Token</h1>
  <p class="sub">Paste the reset token you received, then continue to set a new password.</p>
  <label for="tokenInput">Reset Token</label>
  <input id="tokenInput" placeholder="Paste token here">
  <label for="emailInput">Account Email (for resend)</label>
  <input id="emailInput" type="email" placeholder="name@firm.com">
  <div class="row">
    <button class="btn primary" id="continueBtn" type="button"><i class="fa-solid fa-arrow-right"></i> Continue</button>
    <button class="btn" id="resendBtn" type="button"><i class="fa-solid fa-paper-plane"></i> Resend Token</button>
    <button class="btn" id="backBtn" type="button">Back to Login</button>
  </div>
  <p id="message" class="msg"></p>
  <p style="margin-top:10px;"><a href="passwordRecovery.html">Need a new reset token?</a></p>
</section>

<script src="../../shared/portal-config.js"></script>
<script>
const API_BASE_URL = (window.PortalConfig && window.PortalConfig.API_BASE_URL)
  ? window.PortalConfig.API_BASE_URL
  : "http://127.0.0.1:4010/api";
const params = new URLSearchParams(window.location.search);
const tokenInput = document.getElementById("tokenInput");
tokenInput.value = params.get("token") || "";

function setMessage(text, kind = "") {
  const el = document.getElementById("message");
  el.className = `msg ${kind}`.trim();
  el.textContent = text || "";
}

document.getElementById("continueBtn").addEventListener("click", () => {
  const token = tokenInput.value.trim();
  if (!token) {
    setMessage("Reset token is required.", "error");
    return;
  }
  window.location.href = `resetPassword.html?token=${encodeURIComponent(token)}`;
});

document.getElementById("resendBtn").addEventListener("click", async () => {
  const email = document.getElementById("emailInput").value.trim();
  if (!email) return;
  setMessage("Requesting new reset token...");
  try {
    const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, role: "accountant" }),
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) throw new Error(data.error || "Failed to resend token");
    if (data.resetToken) tokenInput.value = data.resetToken;
    setMessage("New reset token generated. Continue to set password.", "ok");
  } catch (error) {
    setMessage(error.message || "Failed to resend token.", "error");
  }
});

document.getElementById("backBtn").addEventListener("click", () => {
  window.location.href = "login.html";
});
</script>
</body>
</html>
