<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notifications - Client Portal</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#1754cf;
  --bg:#f6f7fb;
  --panel:#ffffff;
  --text:#0e121b;
  --muted:#5b6b8c;
  --border:#e6ebf2;
  --success:#22c55e;
}

/* RESET */
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:"Public Sans",sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* HEADER */
header {
  height:64px;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 32px;
}

.brand {
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
}

.brand-icon {
  width:32px;
  height:32px;
  background:var(--primary);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}

.header-actions {
  display:flex;
  gap:14px;
}

.icon-btn {
  width:40px;
  height:40px;
  border-radius:10px;
  background:#eef2ff;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  cursor:pointer;
}

.icon-btn .dot {
  position:absolute;
  top:8px;
  right:8px;
  width:8px;
  height:8px;
  background:#ef4444;
  border-radius:50%;
  border:2px solid #fff;
}

/* MAIN PLACEHOLDER */
main {
  height:calc(100vh - 64px);
  background:linear-gradient(#f6f7fb,#eef1f6);
}

/* OVERLAY */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(3px);
  display:flex;
  justify-content:flex-end;
}

/* DRAWER */
.drawer {
  width:420px;
  height:100%;
  background:var(--panel);
  box-shadow:-20px 0 40px rgba(0,0,0,.15);
  display:flex;
  flex-direction:column;
  animation:slide .25s ease;
}

@keyframes slide {
  from { transform:translateX(100%); }
  to { transform:translateX(0); }
}

/* DRAWER HEADER */
.drawer-header {
  padding:24px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

.drawer-head-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.drawer-header h2 {
  font-size:20px;
  font-weight:700;
}

.drawer-header p {
  font-size:14px;
  color:var(--muted);
}

.close {
  cursor:pointer;
  color:var(--muted);
}

.back-btn {
  height: 32px;
  padding: 0 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}

/* FILTERS */
.filters {
  display:flex;
  gap:8px;
  padding:12px 24px;
  border-bottom:1px solid var(--border);
  background:#f9fbff;
}

.filter {
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}

.filter.active {
  background:var(--primary);
  color:#fff;
}

.filter:not(.active) {
  color:var(--muted);
}

/* LIST */
.list {
  flex:1;
  overflow:auto;
}

/* ITEM */
.item {
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  gap:14px;
  position:relative;
}

.item.unread {
  background:#f3f7ff;
}

.item.unread::after {
  content:"";
  width:8px;
  height:8px;
  background:var(--primary);
  border-radius:50%;
  position:absolute;
  top:24px;
  right:24px;
}

.item.focus {
  border-left: 3px solid var(--primary);
  background: #eff6ff;
}

.item.selected {
  outline: 2px solid #bfdbfe;
  outline-offset: -2px;
}

.selection-wrap {
  display: flex;
  align-items: center;
}

.selection-wrap input {
  width: 16px;
  height: 16px;
}

.icon {
  width:48px;
  height:48px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#e8efff;
  color:var(--primary);
}

.avatar {
  border-radius:50%;
  overflow:hidden;
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.content h4 {
  font-size:15px;
  font-weight:700;
}

.time {
  font-size:12px;
  color:var(--muted);
}

.content p {
  font-size:14px;
  color:var(--muted);
  margin:6px 0 12px;
}

.actions {
  display:flex;
  gap:14px;
  align-items:center;
}

.btn {
  height:36px;
  padding:0 14px;
  border-radius:10px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

.btn.primary {
  background:var(--primary);
  color:#fff;
}

.btn.outline {
  border:1px solid var(--primary);
  background:#fff;
  color:var(--primary);
}

.link {
  font-size:12px;
  font-weight:700;
  color:var(--muted);
  cursor:pointer;
}

/* FOOTER */
.drawer-footer {
  padding:20px 24px;
  border-top:1px solid var(--border);
}

.drawer-footer .btn {
  width:100%;
  height:48px;
  font-size:15px;
}

.drawer-footer .secondary {
  margin-top:14px;
  text-align:center;
  font-size:14px;
  font-weight:600;
  color:var(--muted);
}

.footer-actions {
  display: grid;
  gap: 10px;
}

.prefs-panel {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  background: #f9fbff;
}

.prefs-grid {
  display: grid;
  gap: 8px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  margin-top: 8px;
}

.prefs-grid label {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.days-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.days-grid label {
  font-size: 12px;
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 4px 8px;
  background: #fff;
}

.focus-alert {
  margin: 0 24px 12px;
  border: 1px solid #bfdbfe;
  border-radius: 10px;
  background: #eff6ff;
  padding: 12px;
}

.focus-alert h4 {
  font-size: 14px;
  margin-bottom: 6px;
}
</style>
<link rel="stylesheet" href="../../shared/client-theme.css">
<link rel="stylesheet" href="../../shared/inline-migrated.css">
</head>

<body>

<header>
  <div class="brand">
    <div class="brand-icon">
      <span class="material-symbols-outlined">account_balance</span>
    </div>
    ProAccount Portal
  </div>
  <div class="header-actions">
    <div class="icon-btn">
      <span class="material-symbols-outlined">notifications</span>
      <span class="dot"></span>
    </div>
    <div class="icon-btn">
      <span class="material-symbols-outlined">account_circle</span>
    </div>
  </div>
</header>

<main></main>

<div class="overlay">
  <div class="drawer">

    <div class="drawer-header">
      <div>
        <h2>Notifications</h2>
        <p id="unreadText">You have 0 unread updates</p>
      </div>
      <div class="drawer-head-actions">
        <button class="back-btn" id="backBtn" type="button">Back</button>
        <button class="back-btn close" id="closeBtn" type="button" aria-label="Close notifications">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
    </div>

    <div class="filters">
      <label class="selection-wrap" title="Select all loaded notifications">
        <input type="checkbox" id="selectAllCb" aria-label="Select all notifications">
      </label>
      <div class="filter active" data-filter="all">All</div>
      <div class="filter" data-filter="unread">Unread</div>
      <div class="filter" data-filter="action">Action Required</div>
    </div>

    <div id="focusAlertPanel"></div>
    <div class="list" id="notificationList"></div>

    <div class="drawer-footer">
      <div class="footer-actions">
        <button class="btn primary" id="loadMoreBtn" type="button">Load More</button>
        <button class="btn outline" id="markSelectedReadBtn" type="button">Mark selected as read</button>
        <div class="secondary" id="markAllReadBtn">Mark all as read</div>
      </div>
    </div>

    <div class="prefs-panel">
      <strong>Notification Preferences</strong>
      <div class="prefs-grid">
        <label><input type="checkbox" id="prefInApp"> In-app</label>
        <label><input type="checkbox" id="prefEmail"> Email</label>
        <label><input type="checkbox" id="prefSms"> SMS</label>
      </div>
      <div class="days-grid" id="reminderDaysGrid">
        <label><input type="checkbox" value="30">30d</label>
        <label><input type="checkbox" value="14">14d</label>
        <label><input type="checkbox" value="7">7d</label>
        <label><input type="checkbox" value="3">3d</label>
        <label><input type="checkbox" value="1">1d</label>
      </div>
      <div class="secondary" id="savePrefsBtn">Save preferences</div>
    </div>

  </div>
</div>

<script src="../../shared/portal-config.js"></script>
<script src="../../shared/portal-auth.js"></script>
<script src="../../shared/client-ui.js"></script>
<script>
const API_BASE_URL = window.PortalConfig.API_BASE_URL;
const session = window.PortalAuth.requireRole("client", "../Clientlogins/login.html");
if (!session) { throw new Error("Unauthorized"); }
const { token } = session;
const pageParams = new URLSearchParams(window.location.search);
const selectedIds = new Set();
let loadedItems = [];

function authHeaders() {
  return window.PortalAuth.authHeaders(token);
}

function goBackToClientPage() {
  const fallback = "Clientportal.html";
  const referrer = document.referrer || "";
  try {
    if (referrer && new URL(referrer).origin === window.location.origin) {
      window.history.back();
      return;
    }
  } catch (_error) {
    // fallback below
  }
  window.location.href = fallback;
}

let page = 1;
const limit = 10;
let activeFilter = "all";
let hasMore = false;

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function iconForType(type) {
  if (type === "message_received") return "mail";
  if (type === "request_created" || type === "document_request") return "upload_file";
  return "notifications";
}

function deriveOpenLink(notification) {
  const type = String(notification.type || "").toLowerCase();
  if (type.includes("message")) return "messages.html";
  if (type.includes("request")) return "clientrequest.html";
  if (type.includes("compliance")) return "Clientportal.html";
  return "Clientportal.html";
}

function renderItems(items, append = false) {
  const list = document.getElementById("notificationList");
  const focusedNotificationId = pageParams.get("notificationId");
  if (!append) list.innerHTML = "";
  loadedItems = append ? loadedItems.concat(items) : [...items];
  for (const n of items) {
    const div = document.createElement("div");
    div.className = `item ${n.read ? "" : "unread"} ${selectedIds.has(n.id) ? "selected" : ""} ${focusedNotificationId === n.id ? "focus" : ""}`;
    div.setAttribute("data-id", n.id);
    div.innerHTML = `
      <label class="selection-wrap">
        <input type="checkbox" data-select-id="${n.id}" ${selectedIds.has(n.id) ? "checked" : ""} aria-label="Select notification">
      </label>
      <div class="icon"><span class="material-symbols-outlined">${iconForType(n.type)}</span></div>
      <div class="content">
        <div class="inl-1141c4304a">
          <h4>${escapeHtml(n.title)}</h4>
          <span class="time">${new Date(n.createdAt).toLocaleString()}</span>
        </div>
        <p>${escapeHtml(n.message)}</p>
        <div class="actions">
          <a class="link" href="${deriveOpenLink(n)}">Open</a>
          <span class="link" data-read-id="${n.id}">${n.read ? "Read" : "Mark as read"}</span>
          <span class="link" data-dismiss-id="${n.id}">Dismiss</span>
          <span class="link" data-snooze-id="${n.id}" data-snooze-hours="24">Snooze 24h</span>
        </div>
      </div>
    `;
    list.appendChild(div);
  }
  const allSelected = loadedItems.length > 0 && loadedItems.every((item) => selectedIds.has(item.id));
  document.getElementById("selectAllCb").checked = allSelected;
}

async function loadNotifications(append = false) {
  const unreadQuery = activeFilter === "unread" ? "&unread=true" : "";
  const typeQuery = activeFilter === "action" ? "&type=request_created" : "";
  const response = await fetch(`${API_BASE_URL}/notifications?page=${page}&limit=${limit}${unreadQuery}${typeQuery}`, {
    headers: authHeaders(),
  });
  if (!response.ok) return;
  const data = await response.json();
  renderItems(data.items || [], append);
  const focusedNotificationId = pageParams.get("notificationId");
  if (focusedNotificationId) {
    const target = document.querySelector(`.item[data-id="${focusedNotificationId}"]`);
    if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  document.getElementById("unreadText").textContent = `You have ${data.unreadCount || 0} unread updates`;
  hasMore = Boolean(data.pagination?.hasMore);
  document.getElementById("loadMoreBtn").style.display = hasMore ? "block" : "none";
}

async function loadFocusedAlert() {
  const alertId = pageParams.get("alertId");
  const panel = document.getElementById("focusAlertPanel");
  if (!alertId) {
    panel.innerHTML = "";
    return;
  }
  const response = await fetch(`${API_BASE_URL}/compliance/overview`, { headers: authHeaders() });
  if (!response.ok) return;
  const data = await response.json().catch(() => ({}));
  const alerts = Array.isArray(data.alerts) ? data.alerts : [];
  const target = alerts.find((item) => item.id === alertId);
  if (!target) {
    panel.innerHTML = `<div class="focus-alert"><h4>Linked alert not found</h4><p>This alert may already be resolved.</p></div>`;
    return;
  }
  panel.innerHTML = `
    <div class="focus-alert">
      <h4>${escapeHtml(target.title || "Compliance Alert")}</h4>
      <p>${escapeHtml(target.message || "")}</p>
      <div class="actions">
        <button class="btn outline" type="button" data-ack-alert="${escapeHtml(target.id)}">Acknowledge</button>
      </div>
    </div>
  `;
}

async function markSelectedRead() {
  const ids = Array.from(selectedIds);
  if (!ids.length) {
    if (window.ClientUI) window.ClientUI.toast("Select notifications first", "info");
    return;
  }
  const response = await fetch(`${API_BASE_URL}/notifications/read-bulk`, {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ ids }),
  });
  if (!response.ok) return;
  selectedIds.clear();
  page = 1;
  await loadNotifications(false);
  if (window.ClientUI) window.ClientUI.toast("Selected notifications marked as read", "success");
}

async function loadPreferences() {
  const response = await fetch(`${API_BASE_URL}/notifications/preferences`, {
    headers: authHeaders(),
  });
  if (!response.ok) return;
  const data = await response.json().catch(() => ({}));
  const prefs = data.preferences || {};
  const channels = prefs.channels || {};
  const reminderDays = Array.isArray(prefs.reminderDays) ? prefs.reminderDays.map((value) => Number(value)) : [30, 14, 7, 3, 1];
  document.getElementById("prefInApp").checked = channels.inApp !== false;
  document.getElementById("prefEmail").checked = channels.email !== false;
  document.getElementById("prefSms").checked = channels.sms === true;
  document.querySelectorAll("#reminderDaysGrid input[type='checkbox']").forEach((input) => {
    input.checked = reminderDays.includes(Number(input.value));
  });
}

async function savePreferences() {
  const reminderDays = Array.from(document.querySelectorAll("#reminderDaysGrid input[type='checkbox']:checked"))
    .map((input) => Number(input.value))
    .filter((value) => Number.isInteger(value) && value >= 0)
    .sort((a, b) => b - a);
  const payload = {
    channels: {
      inApp: document.getElementById("prefInApp").checked,
      email: document.getElementById("prefEmail").checked,
      sms: document.getElementById("prefSms").checked,
    },
    reminderDays,
  };
  const response = await fetch(`${API_BASE_URL}/notifications/preferences`, {
    method: "PATCH",
    headers: authHeaders(),
    body: JSON.stringify(payload),
  });
  if (!response.ok) {
    if (window.ClientUI) window.ClientUI.toast("Failed to save preferences", "error");
    return;
  }
  if (window.ClientUI) window.ClientUI.toast("Notification preferences saved", "success");
}

document.querySelectorAll(".filter").forEach((el) => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".filter").forEach((f) => f.classList.remove("active"));
    el.classList.add("active");
    activeFilter = el.getAttribute("data-filter");
    page = 1;
    selectedIds.clear();
    loadNotifications(false);
  });
});

document.getElementById("loadMoreBtn").addEventListener("click", () => {
  if (!hasMore) return;
  page += 1;
  loadNotifications(true);
});

document.getElementById("markAllReadBtn").addEventListener("click", async () => {
  const response = await fetch(`${API_BASE_URL}/notifications/read-all`, {
    method: "POST",
    headers: authHeaders(),
    body: "{}",
  });
  if (response.ok) {
    page = 1;
    loadNotifications(false);
    if (window.ClientUI) window.ClientUI.toast("All notifications marked as read", "success");
  }
});

document.getElementById("markSelectedReadBtn").addEventListener("click", markSelectedRead);
document.getElementById("savePrefsBtn").addEventListener("click", savePreferences);
document.getElementById("backBtn").addEventListener("click", goBackToClientPage);
document.getElementById("closeBtn").addEventListener("click", goBackToClientPage);
document.querySelector(".overlay").addEventListener("click", (event) => {
  if (event.target.classList.contains("overlay")) {
    goBackToClientPage();
  }
});
document.getElementById("selectAllCb").addEventListener("change", (event) => {
  const checked = event.target.checked;
  if (checked) {
    loadedItems.forEach((item) => selectedIds.add(item.id));
  } else {
    loadedItems.forEach((item) => selectedIds.delete(item.id));
  }
  renderItems(loadedItems, false);
});

document.addEventListener("click", async (event) => {
  const selectCb = event.target.closest("[data-select-id]");
  if (selectCb) {
    const id = selectCb.getAttribute("data-select-id");
    if (selectCb.checked) selectedIds.add(id);
    else selectedIds.delete(id);
    const row = selectCb.closest(".item");
    if (row) row.classList.toggle("selected", selectCb.checked);
    const allSelected = loadedItems.length > 0 && loadedItems.every((item) => selectedIds.has(item.id));
    document.getElementById("selectAllCb").checked = allSelected;
    return;
  }

  const ackBtn = event.target.closest("[data-ack-alert]");
  if (ackBtn) {
    const alertId = ackBtn.getAttribute("data-ack-alert");
    const response = await fetch(`${API_BASE_URL}/compliance/alerts/${encodeURIComponent(alertId)}/acknowledge`, {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ note: "Client acknowledged from notifications drawer." }),
    });
    if (response.ok) {
      if (window.ClientUI) window.ClientUI.toast("Compliance alert acknowledged", "success");
      loadFocusedAlert();
    }
    return;
  }

  const readBtn = event.target.closest("[data-read-id]");
  if (readBtn) {
    const id = readBtn.getAttribute("data-read-id");
    const response = await fetch(`${API_BASE_URL}/notifications/${encodeURIComponent(id)}/read`, {
      method: "POST",
      headers: authHeaders(),
      body: "{}",
    });
    if (response.ok) {
      page = 1;
      loadNotifications(false);
      if (window.ClientUI) window.ClientUI.toast("Notification marked as read", "info");
    }
    return;
  }

  const dismissBtn = event.target.closest("[data-dismiss-id]");
  if (dismissBtn) {
    const id = dismissBtn.getAttribute("data-dismiss-id");
    const response = await fetch(`${API_BASE_URL}/notifications/${encodeURIComponent(id)}/dismiss`, {
      method: "POST",
      headers: authHeaders(),
      body: "{}",
    });
    if (response.ok) {
      selectedIds.delete(id);
      page = 1;
      loadNotifications(false);
      if (window.ClientUI) window.ClientUI.toast("Notification dismissed", "success");
    }
    return;
  }

  const snoozeBtn = event.target.closest("[data-snooze-id]");
  if (snoozeBtn) {
    const id = snoozeBtn.getAttribute("data-snooze-id");
    const hours = Number(snoozeBtn.getAttribute("data-snooze-hours") || 24);
    const response = await fetch(`${API_BASE_URL}/notifications/${encodeURIComponent(id)}/snooze`, {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ hours }),
    });
    if (response.ok) {
      selectedIds.delete(id);
      page = 1;
      loadNotifications(false);
      if (window.ClientUI) window.ClientUI.toast(`Notification snoozed for ${hours}h`, "info");
    }
  }
});

Promise.all([
  loadNotifications(false),
  loadPreferences(),
  loadFocusedAlert(),
]).catch(() => {});
</script>
</body>
</html>
