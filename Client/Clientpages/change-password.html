<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - Prospera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../shared/client-theme.css">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --danger: #b91c1c;
      --success: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Public Sans", "Segoe UI", Arial, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }
    .top-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #334155;
      text-decoration: none;
      margin-bottom: 14px;
      font-weight: 600;
    }
    .top-back:hover {
      color: #0f172a;
      text-decoration: underline;
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p.desc { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
    .group { margin-bottom: 14px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      letter-spacing: .02em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.primary { background: #0f172a; color: #f8fafc; }
    .btn.secondary { background: #fff; border-color: var(--border); color: var(--text); }
    .msg {
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
    }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--success); }
  </style>
</head>
<body>
  <main class="card">
    <a class="top-back" href="settings.html" aria-label="Back to settings">
      <i class="fa-solid fa-arrow-left"></i>
      Back to Settings
    </a>
    <h1>Change Password</h1>
    <p class="desc">Use a strong password with at least 8 characters.</p>

    <form id="changePasswordForm">
      <div class="group">
        <label for="currentPassword">Current Password</label>
        <input id="currentPassword" type="password" autocomplete="current-password" required>
      </div>
      <div class="group">
        <label for="newPassword">New Password</label>
        <input id="newPassword" type="password" autocomplete="new-password" required minlength="8">
      </div>
      <div class="group">
        <label for="confirmPassword">Confirm New Password</label>
        <input id="confirmPassword" type="password" autocomplete="new-password" required minlength="8">
      </div>

      <div class="actions">
        <button class="btn secondary" type="button" id="cancelBtn">Cancel</button>
        <button class="btn primary" type="submit" id="submitBtn">Update Password</button>
      </div>
    </form>

    <div id="message" class="msg" aria-live="polite"></div>
  </main>

  <script src="../../shared/portal-config.js"></script>
  <script src="../../shared/portal-auth.js"></script>
  <script src="../../shared/portal-api.js"></script>
  <script src="../../shared/client-ui.js"></script>
  <script>
    const session = window.PortalAuth.requireRole("client", "../Clientlogins/login.html");
    if (!session) throw new Error("Unauthorized");

    const { token } = session;
    const API_BASE_URL = window.PortalConfig?.API_BASE_URL || "http://127.0.0.1:4010/api";

    const form = document.getElementById("changePasswordForm");
    const submitBtn = document.getElementById("submitBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const message = document.getElementById("message");

    function showMessage(text, kind) {
      message.textContent = text || "";
      message.className = `msg ${kind || ""}`;
    }

    function authHeaders() {
      return window.PortalAuth.authHeaders(token);
    }

    cancelBtn.addEventListener("click", () => {
      window.location.href = "settings.html";
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const currentPassword = document.getElementById("currentPassword").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (!currentPassword || !newPassword || !confirmPassword) {
        showMessage("Fill in all fields.", "error");
        return;
      }
      if (newPassword.length < 8) {
        showMessage("New password must be at least 8 characters.", "error");
        return;
      }
      if (newPassword !== confirmPassword) {
        showMessage("New password and confirmation do not match.", "error");
        return;
      }

      if (window.ClientUI) window.ClientUI.setLoading(submitBtn, true, "Updating...");
      else submitBtn.disabled = true;
      showMessage("Updating password...", "");

      try {
        if (window.PortalApi?.requestJson) {
          await window.PortalApi.requestJson("/security/change-password", {
            method: "POST",
            body: { currentPassword, newPassword },
          });
        } else {
          const response = await fetch(`${API_BASE_URL}/security/change-password`, {
            method: "POST",
            headers: { ...authHeaders(), "Content-Type": "application/json" },
            body: JSON.stringify({ currentPassword, newPassword }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(data.error || "Failed to change password");
          }
        }
        showMessage("Password changed successfully. Redirecting to settings...", "success");
        setTimeout(() => {
          window.location.href = "settings.html";
        }, 1200);
      } catch (error) {
        showMessage(error.message || "Failed to change password", "error");
      } finally {
        if (window.ClientUI) window.ClientUI.setLoading(submitBtn, false);
        else submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
