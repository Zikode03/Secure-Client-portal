<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Document - Prospera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
/* ──────────────────────────────────────────────── */
/* Reuse almost identical CSS from documents.html   */
/* ──────────────────────────────────────────────── */

:root {
  --blue: #2563eb;
  --bg: #f5f7fb;
  --dark: #0f172a;
  --muted: #64748b;
  --border: #e5e7eb;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  height: 100vh;
  overflow: hidden;
  color: var(--dark);
}

.app-layout {
  display: flex;
  height: 100vh;
  --sidebar-width: 260px;
}

/* Sidebar ─ identical to documents page */
.sidebar {
  width: var(--sidebar-width);
  flex: 0 0 var(--sidebar-width);
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 22px;
  display: flex;
  gap: 12px;
  align-items: center;
}

.sidebar-header i {
  font-size: 30px;
  color: #60a5fa;
}

.sidebar-header h1 { font-size: 16px; }
.sidebar-header p { font-size: 12px; color: #94a3b8; }

.nav {
  padding: 16px;
  flex: 1;
}

.nav a {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 12px 14px;
  border-radius: 10px;
  color: #cbd5f5;
  text-decoration: none;
  margin-bottom: 6px;
}

.nav a.active { background: var(--blue); color: white; }
.nav a:hover { background: #1e293b; }

.sidebar-footer { padding: 16px; }

.user-box {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.user-box p { margin: 2px 0; font-size: 13px; }
.role { color: #60a5fa; font-size: 12px; }

.logout {
  width: 100%;
  background: none;
  border: none;
  color: #cbd5f5;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
}

.logout:hover { background: #1e293b; }

.sidebar-resizer {
  width: 8px;
  cursor: col-resize;
  background: transparent;
  flex: 0 0 8px;
  transition: background .2s;
}

.sidebar-resizer:hover {
  background: rgba(148, 163, 184, 0.25);
}

.app-layout.resizing {
  user-select: none;
  cursor: col-resize;
}

.app-layout.sidebar-icons-only .sidebar-header {
  justify-content: center;
  padding: 20px 0;
}

.app-layout.sidebar-icons-only .sidebar-header > div {
  display: none;
}

.app-layout.sidebar-icons-only .nav {
  padding: 12px 10px;
}

.app-layout.sidebar-icons-only .nav a {
  justify-content: center;
  font-size: 0;
  padding: 12px;
}

.app-layout.sidebar-icons-only .nav a i {
  font-size: 18px;
  margin: 0;
}

.app-layout.sidebar-icons-only .sidebar-footer {
  padding: 12px 10px;
}

.app-layout.sidebar-icons-only .user-box {
  display: none;
}

.app-layout.sidebar-icons-only .logout {
  display: flex;
  justify-content: center;
  font-size: 0;
  padding: 12px;
}

.app-layout.sidebar-icons-only .logout i {
  font-size: 18px;
  margin: 0;
}

/* Main content */
.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.top-row h2 {
  font-size: 30px;
  margin-bottom: 4px;
}

.top-row p {
  color: var(--muted);
  font-size: 14px;
}

.panel {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  max-width: 720px;
  margin: 0 auto;
}

.drop-zone {
  border: 2px dashed #cbd5e1;
  border-radius: 14px;
  background: #ffffff;
  padding: 60px 24px;
  text-align: center;
  transition: all 0.25s ease;
  cursor: pointer;
  margin-bottom: 24px;
}

.drop-zone.drag {
  border-color: var(--blue);
  background: #eff6ff;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

.drop-zone i {
  font-size: 48px;
  color: var(--muted);
  margin-bottom: 16px;
}

.drop-zone .title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.drop-zone .subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
}

.drop-zone .note {
  font-size: 13px;
  color: #94a3b8;
}

.file-list {
  margin-top: 20px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: #f8fafc;
  border-radius: 10px;
  margin-bottom: 10px;
  font-size: 14px;
}

.file-item i {
  font-size: 24px;
  color: var(--blue);
}

.file-meta {
  flex: 1;
}

.file-name {
  font-weight: 500;
}

.file-size {
  color: var(--muted);
  font-size: 13px;
}

.btn {
  border: none;
  border-radius: 10px;
  font-weight: 600;
  padding: 12px 20px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--dark);
  color: white;
}

.btn-primary:hover {
  background: #020617;
}

.btn-primary:disabled {
  background: #94a3b8;
  cursor: not-allowed;
}

.btn-secondary {
  background: white;
  border: 1px solid var(--border);
  color: var(--dark);
}

.btn-secondary:hover {
  background: #f1f5f9;
}

.form-group {
  margin: 24px 0 16px;
}

label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
  color: #334155;
}

select, input[type="text"] {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  background: white;
}

.status-message {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
}

.success { background: #ecfdf5; color: #065f46; border: 1px solid #10b98133; }
.error   { background: #fef2f2; color: #991b1b; border: 1px solid #ef444433; }

.hidden { display: none; }

@media (max-width: 768px) {
  .main-content { padding: 16px; }
  .panel { padding: 20px; }
}
</style>
<link rel="stylesheet" href="../../shared/client-theme.css">
<link rel="stylesheet" href="../../shared/client-shell.css">
</head>
<body data-client-nav="documents">
<div class="app-layout">
  <!-- Sidebar ─ identical structure & classes -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <i class="fa-solid fa-shield-halved"></i>
      <div>
        <h1>Prospera</h1>
        <p>Secure Client Portal</p>
      </div>
    </div>

    <nav class="nav">
      <a href="Clientportal.html" data-nav="dashboard"><i class="fa fa-chart-line"></i> Dashboard</a>
      <a href="documents.html" class="active" data-nav="documents"><i class="fa fa-file"></i> Documents</a>
      <a href="clientrequest.html" data-nav="requests"><i class="fa fa-file-alt"></i> Requests</a>
      <a href="messages.html" data-nav="messages"><i class="fa fa-message"></i> Messages</a>
      <a href="settings.html" data-nav="settings"><i class="fa fa-gear"></i> Settings</a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-box">
        <p><strong id="sidebarName">Client</strong></p>
        <p id="sidebarEmail">client@example.com</p>
        <p class="role">Client</p>
      </div>
      <button class="logout" id="logoutBtn"><i class="fa fa-sign-out"></i> Logout</button>
    </div>
  </aside>
  <div class="sidebar-resizer" id="sidebarResizer" role="separator" aria-label="Resize sidebar" aria-orientation="vertical"></div>

  <main class="main-content">
    <div class="top-row">
      <div>
        <h2>Upload Document</h2>
        <p>Securely upload files to your account — max 25 MB per file</p>
      </div>
    </div>

    <div class="panel">
      <div class="drop-zone" id="dropZone">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <div class="title">Drag & drop your file here</div>
        <div class="subtitle">or click to browse</div>
        <div class="note">PDF, DOCX, XLSX, JPG, PNG — up to 25 MB</div>
      </div>

      <div id="fileList" class="file-list hidden"></div>

      <div class="form-group">
        <label for="category">Category (optional)</label>
        <select id="category">
          <option value="">Auto-detect</option>
          <option value="Invoices">Invoices</option>
          <option value="Bank Statements">Bank Statements</option>
          <option value="Tax Documents">Tax Documents</option>
          <option value="Contracts">Contracts</option>
          <option value="General">General</option>
        </select>
      </div>

      <div class="form-group">
        <label for="notes">Notes / Description (optional)</label>
        <input type="text" id="notes" placeholder="e.g. Q4 2025 Invoice Batch">
      </div>

      <div style="display: flex; gap: 12px; margin-top: 32px;">
        <button class="btn btn-primary" id="uploadBtn" disabled>Upload File</button>
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
      </div>

      <div id="statusMessage" class="status-message hidden"></div>
    </div>
  </main>
</div>

<script src="../../shared/portal-config.js"></script>
<script src="../../shared/portal-auth.js"></script>
<script src="../../shared/client-ui.js"></script>
<script src="../../shared/client-shell.js"></script>
<script>
// ────────────────────────────────────────────────
//   Authentication & Session (same as documents.html)
// ────────────────────────────────────────────────
const session = window.PortalAuth.requireRole("client", "../Clientlogins/login.html");
if (!session) throw new Error("Unauthorized");

const { token, user } = session;

document.getElementById("sidebarName").textContent  = user.fullName || "Client";
document.getElementById("sidebarEmail").textContent = user.email || "";

const appLayout = document.querySelector(".app-layout");
const sidebarResizer = document.getElementById("sidebarResizer");
const SIDEBAR_MIN_WIDTH = 82;
const SIDEBAR_MAX_WIDTH = 380;
const SIDEBAR_DEFAULT_WIDTH = 260;
const SIDEBAR_STORAGE_KEY = "uploadSidebarWidth";

function setSidebarWidth(width) {
  const clamped = Math.max(SIDEBAR_MIN_WIDTH, Math.min(SIDEBAR_MAX_WIDTH, width));
  appLayout.style.setProperty("--sidebar-width", `${clamped}px`);
  appLayout.classList.toggle("sidebar-icons-only", clamped <= SIDEBAR_MIN_WIDTH + 4);
  localStorage.setItem(SIDEBAR_STORAGE_KEY, String(clamped));
}

function initSidebarResize() {
  const saved = Number(localStorage.getItem(SIDEBAR_STORAGE_KEY));
  setSidebarWidth(Number.isFinite(saved) && saved > 0 ? saved : SIDEBAR_DEFAULT_WIDTH);

  let dragging = false;

  sidebarResizer.addEventListener("pointerdown", (event) => {
    dragging = true;
    appLayout.classList.add("resizing");
    sidebarResizer.setPointerCapture(event.pointerId);
  });

  sidebarResizer.addEventListener("pointermove", (event) => {
    if (!dragging) return;
    setSidebarWidth(event.clientX);
  });

  sidebarResizer.addEventListener("pointerup", (event) => {
    dragging = false;
    appLayout.classList.remove("resizing");
    sidebarResizer.releasePointerCapture(event.pointerId);
  });

  sidebarResizer.addEventListener("dblclick", () => {
    const current = parseInt(getComputedStyle(appLayout).getPropertyValue("--sidebar-width"), 10) || SIDEBAR_DEFAULT_WIDTH;
    setSidebarWidth(current <= SIDEBAR_MIN_WIDTH + 4 ? SIDEBAR_DEFAULT_WIDTH : SIDEBAR_MIN_WIDTH);
  });
}

const API_BASE_URL = window.PortalConfig?.API_BASE_URL || "http://127.0.0.1:4010/api";

function authHeaders() {
  return window.PortalAuth.authHeaders(token);
}

async function resolveClientId() {
  const localIds = Array.isArray(user.clientIds) ? user.clientIds : [];
  if (localIds.length) return localIds[0];

  const meRes = await fetch(`${API_BASE_URL}/auth/me`, { headers: authHeaders() });
  const meData = await meRes.json().catch(() => ({}));
  if (!meRes.ok) {
    throw new Error(meData.error || "Unable to resolve client profile.");
  }

  const freshUser = meData.user || {};
  const freshIds = Array.isArray(freshUser.clientIds) ? freshUser.clientIds : [];
  if (!freshIds.length) return "";

  try {
    localStorage.setItem("authUser", JSON.stringify(freshUser));
  } catch (_error) {
    // ignore storage write errors
  }
  return freshIds[0];
}

// ────────────────────────────────────────────────
//   Upload logic
// ────────────────────────────────────────────────
const dropZone   = document.getElementById("dropZone");
const fileListEl = document.getElementById("fileList");
const uploadBtn  = document.getElementById("uploadBtn");
const cancelBtn  = document.getElementById("cancelBtn");
const statusMsg  = document.getElementById("statusMessage");
const categoryEl = document.getElementById("category");
const notesEl    = document.getElementById("notes");

let selectedFile = null;

function showStatus(text, type = "success") {
  if (window.ClientUI) {
    window.ClientUI.inlineMessage(statusMsg, text, type === "error" ? "error" : "success");
    return;
  }
  statusMsg.textContent = text;
  statusMsg.className = `status-message ${type}`;
  statusMsg.classList.remove("hidden");
}

function hideStatus() {
  statusMsg.classList.add("hidden");
}

function displayFile(file) {
  selectedFile = file;
  uploadBtn.disabled = false;

  const size = file.size < 1024 * 1024
    ? `${(file.size / 1024).toFixed(1)} KB`
    : `${(file.size / (1024 * 1024)).toFixed(1)} MB`;

  fileListEl.innerHTML = `
    <div class="file-item">
      <i class="fa-solid fa-file-lines"></i>
      <div class="file-meta">
        <div class="file-name">${file.name}</div>
        <div class="file-size">${size}</div>
      </div>
    </div>
  `;
  fileListEl.classList.remove("hidden");
}

function clearFile() {
  selectedFile = null;
  uploadBtn.disabled = true;
  fileListEl.classList.add("hidden");
  fileListEl.innerHTML = "";
  hideStatus();
}

// ── Drag & Drop ───────────────────────────────────
dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("drag");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("drag");
});

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("drag");

  const file = e.dataTransfer.files[0];
  if (!file) return;

  if (file.size > 25 * 1024 * 1024) {
    showStatus("File is too large (max 25 MB)", "error");
    return;
  }

  displayFile(file);
});

// ── Click to browse ───────────────────────────────
dropZone.addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png";
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 25 * 1024 * 1024) {
      showStatus("File is too large (max 25 MB)", "error");
      return;
    }
    displayFile(file);
  };
  input.click();
});

// ── Upload ────────────────────────────────────────
uploadBtn.addEventListener("click", async () => {
  if (!selectedFile) return;

  if (window.ClientUI) window.ClientUI.setLoading(uploadBtn, true, "Uploading...");
  else uploadBtn.disabled = true;
  showStatus("Uploading... Please wait", "success");

  try {
    const clientId = await resolveClientId();

    const payload = {
      name: selectedFile.name,
      category: categoryEl.value || "General",
      sizeBytes: selectedFile.size,
      status: "pending",
    };
    if (clientId) payload.clientId = clientId;

    const res = await fetch(`${API_BASE_URL}/documents`, {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || err.message || `Upload failed (${res.status})`);
    }

    showStatus("File uploaded successfully!", "success");
    if (window.ClientUI) window.ClientUI.toast("Upload successful", "success");

    // Optional: redirect back after short delay
    setTimeout(() => {
      window.location.href = "documents.html";
    }, 1800);

  } catch (err) {
    showStatus(`Error: ${err.message}`, "error");
    if (window.ClientUI) {
      window.ClientUI.toast(err.message || "Upload failed", "error");
      window.ClientUI.setLoading(uploadBtn, false);
    } else {
      uploadBtn.disabled = false;
    }
    return;
  }
  if (window.ClientUI) window.ClientUI.setLoading(uploadBtn, false);
});

cancelBtn.addEventListener("click", () => {
  window.location.href = "documents.html";
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  window.PortalAuth.clearSession();
  window.location.href = "../Clientlogins/login.html";
});

initSidebarResize();
</script>
</body>
</html>
